<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Events</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all .18s;
      cursor: pointer;
    }
    .event-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .event-cover {
      height: 140px;
      background: linear-gradient(135deg, #1a2040, #0e1428);
      position: relative;
      overflow: hidden;
    }
    .event-cover img { width: 100%; height: 100%; object-fit: cover; }
    .event-date-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      line-height: 1.2;
      font-size: 13px;
    }
    .event-date-badge .day { font-size: 22px; display: block; }
    .event-body { padding: 14px; }
    .event-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .event-meta { font-size: 12px; color: var(--text3); display: flex; flex-direction: column; gap: 3px; }
    .event-meta span { display: flex; align-items: center; gap: 5px; }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px">&#9776;</button>
      <span style="font-weight:700">Events</span>
    </div>

    <div class="page-container wide" style="max-width:1000px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h1 style="font-family:'Nunito',sans-serif;font-size:24px;font-weight:900">Events</h1>
        <button class="btn btn-primary" onclick="openCreateEvent()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create Event
        </button>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" id="tab-upcoming" onclick="loadTab('upcoming')">Upcoming</button>
        <button class="btn btn-ghost btn-sm"   id="tab-mine"     onclick="loadTab('mine')">My Events</button>
        <button class="btn btn-ghost btn-sm"   id="tab-past"     onclick="loadTab('past')">Past</button>
      </div>

      <div id="events-container" class="events-grid">
        <div style="grid-column:1/-1;display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { initMiniPlayer } from '../js/player.js';
import { supabase, requireAuth, getCurrentProfile, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, createModal } from '../js/app.js';

let currentUser, currentProfile;

async function init() {
  currentUser = await requireAuth(); if (!currentUser) return;
  currentProfile = await getCurrentProfile();
  initMiniPlayer();
  document.getElementById('sidebar').innerHTML = renderSidebar(currentProfile, 'events');
  loadTab('upcoming');
}

window.loadTab = async function(tab) {
  ['upcoming','mine','past'].forEach(t => {
    document.getElementById('tab-' + t).className = 'btn btn-sm ' + (t === tab ? 'btn-primary' : 'btn-ghost');
  });
  const c = document.getElementById('events-container');
  c.innerHTML = '<div style="grid-column:1/-1;display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';

  let query = supabase.from('events')
    .select('*, organizer:profiles!organizer_id(id, full_name, avatar_url)')
    .order('starts_at', { ascending: true });

  const now = new Date().toISOString();
  if (tab === 'upcoming') query = query.gte('starts_at', now);
  else if (tab === 'mine') query = query.eq('organizer_id', currentUser.id);
  else query = query.lt('starts_at', now).order('starts_at', { ascending: false });

  const { data: events } = await query.limit(30);

  if (!events?.length) {
    c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon" style="font-size:48px;margin-bottom:12px">&#128197;</div><h3>No events found</h3></div>';
    return;
  }

  // Get user's RSVPs
  const { data: rsvps } = await supabase.from('event_attendees').select('event_id, status').eq('user_id', currentUser.id);
  const rsvpMap = new Map((rsvps || []).map(r => [r.event_id, r.status]));

  c.innerHTML = events.map(ev => renderEventCard(ev, rsvpMap.get(ev.id))).join('');
};

function renderEventCard(ev, myStatus) {
  const d = new Date(ev.starts_at);
  const month = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
  const day   = d.getDate();
  const time  = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const cover = ev.cover_url ? '<img src="' + ev.cover_url + '" alt="">' : '';
  const statusBtns = myStatus
    ? '<button class="btn btn-ghost btn-sm" onclick="cancelRsvp(\'' + ev.id + '\',this)">&#10003; ' + capitalize(myStatus) + '</button>'
    : '<button class="btn btn-primary btn-sm" onclick="rsvp(\'' + ev.id + '\',this)">RSVP</button>';

  return '<div class="event-card">' +
    '<div class="event-cover">' + cover +
      '<div class="event-date-badge"><span class="day">' + day + '</span>' + month + '</div>' +
    '</div>' +
    '<div class="event-body">' +
      '<div class="event-title">' + escHtml(ev.title) + '</div>' +
      '<div class="event-meta">' +
        '<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ' + time + ', ' + d.toLocaleDateString() + '</span>' +
        (ev.location ? '<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + escHtml(ev.location) + '</span>' : '') +
        '<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> ' + (ev.attendees || 0) + ' attending</span>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:12px">' + statusBtns + '</div>' +
    '</div>' +
  '</div>';
}

window.rsvp = async function(eventId, btn) {
  btn.disabled = true;
  const { error } = await supabase.from('event_attendees').insert({ event_id: eventId, user_id: currentUser.id, status: 'going' });
  if (error) { btn.disabled = false; toast('Error', 'error'); return; }
  await supabase.from('events').update({ attendees: supabase.rpc('increment', { row_id: eventId }) }).eq('id', eventId);
  btn.className = 'btn btn-ghost btn-sm';
  btn.textContent = '✓ Going';
  btn.onclick = function() { cancelRsvp(eventId, btn); };
  toast('RSVP confirmed!', 'success');
};

window.cancelRsvp = async function(eventId, btn) {
  await supabase.from('event_attendees').delete().match({ event_id: eventId, user_id: currentUser.id });
  btn.className = 'btn btn-primary btn-sm';
  btn.textContent = 'RSVP';
  btn.onclick = function() { rsvp(eventId, btn); };
  toast('RSVP cancelled', 'info');
};

window.openCreateEvent = function() {
  createModal('Create Event',
    '<div class="form-group"><label>Title *</label><input id="ev-title" placeholder="Event name"></div>' +
    '<div class="form-group"><label>Description</label><textarea id="ev-desc" placeholder="What is this event about?"></textarea></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
      '<div class="form-group"><label>Start Date &amp; Time *</label><input type="datetime-local" id="ev-start"></div>' +
      '<div class="form-group"><label>End Date &amp; Time</label><input type="datetime-local" id="ev-end"></div>' +
    '</div>' +
    '<div class="form-group"><label>Location</label><input id="ev-location" placeholder="Address or Online"></div>' +
    '<div class="form-group"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="ev-online"> Online event</label></div>',
    '<button class="btn btn-ghost" onclick="document.querySelector(\'.modal-overlay\').remove()">Cancel</button>' +
    '<button class="btn btn-primary" id="ev-submit" onclick="submitEvent()">Create Event</button>'
  );
};

window.submitEvent = async function() {
  const title    = document.getElementById('ev-title').value.trim();
  const desc     = document.getElementById('ev-desc').value.trim();
  const startsAt = document.getElementById('ev-start').value;
  const endsAt   = document.getElementById('ev-end').value;
  const location = document.getElementById('ev-location').value.trim();
  const isOnline = document.getElementById('ev-online').checked;

  if (!title || !startsAt) { toast('Title and start date are required', 'error'); return; }

  const btn = document.getElementById('ev-submit');
  btn.disabled = true; btn.textContent = 'Creating...';

  const { error } = await supabase.from('events').insert({
    organizer_id: currentUser.id, title, description: desc || null,
    starts_at: startsAt, ends_at: endsAt || null,
    location: location || null, is_online: isOnline,
  });

  if (error) { toast('Failed: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Create Event'; return; }
  document.querySelector('.modal-overlay')?.remove();
  toast('Event created!', 'success');
  loadTab('mine');
};

function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
