<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — News Feed</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <main class="main-content">
    <!-- Mobile topbar -->
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px">☰</button>
      <span style="font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">VEtmle</span>
    </div>

    <div class="page-container single-col">
      <div class="feed-col">

        <!-- Story Bar -->
        <div class="card" style="padding:14px;margin-bottom:14px;overflow-x:auto">
          <div style="display:flex;gap:10px;min-width:max-content" id="stories-bar">
            <div class="story-add-btn" onclick="addStory()" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:64px">
              <div style="width:60px;height:60px;border-radius:50%;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s">➕</div>
              <span style="font-size:11px;color:var(--text3)">Add Story</span>
            </div>
          </div>
        </div>

        <!-- Compose Post -->
        <div class="post-compose card" id="compose-box">
          <div class="compose-row">
            <img id="compose-avatar" src="../assets/default-avatar.svg" alt="" style="width:44px;height:44px;border-radius:50%;object-fit:cover;object-position:center;flex-shrink:0;display:block;background:var(--surface3)">
            <textarea class="compose-input" id="compose-text" placeholder="What's on your mind?" rows="2"
              onfocus="expandCompose()" style="height:48px;overflow:hidden"></textarea>
          </div>
          <!-- image preview -->
          <div id="image-preview" style="display:none;margin:8px 0 0 56px;position:relative;width:fit-content">
            <img id="image-preview-img" style="max-height:240px;max-width:100%;border-radius:10px;object-fit:cover;display:block" src="" alt="">
            <button onclick="clearImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
          </div>
          <div class="compose-footer" id="compose-footer" style="display:none">
            <div class="compose-tools">
              <button class="compose-tool-btn" onclick="document.getElementById('post-image-input').click()" title="Add photo" style="display:flex;align-items:center;gap:4px;padding:0 10px;width:auto;font-size:13px;font-weight:600;color:var(--text2)">
                🖼️ <span>Photo</span>
              </button>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <span id="char-count" style="font-size:11px;color:var(--text3)">0 / 2000</span>
              <button class="btn btn-primary btn-sm" id="post-submit-btn" onclick="submitPost()">Post</button>
            </div>
          </div>
          <input type="file" id="post-image-input" accept="image/*" style="display:none" onchange="previewImage(this)">
        </div>

        <!-- Filter Tabs -->
        <div style="display:flex;gap:4px;margin-bottom:12px">
          <button class="btn btn-primary btn-sm" id="filter-all" onclick="setFilter('all')">All Posts</button>
          <button class="btn btn-ghost btn-sm" id="filter-friends" onclick="setFilter('friends')">Friends</button>
        </div>

        <!-- Feed -->
        <div id="feed-container">
          <div style="display:flex;justify-content:center;padding:40px">
            <div class="spinner"></div>
          </div>
        </div>

        <div id="load-more-wrap" style="text-align:center;padding:16px;display:none">
          <button class="btn btn-ghost" onclick="loadMorePosts()">Load More</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderPost, formatCount } from '../js/app.js';

let currentUser = null;
let currentProfile = null;
let postOffset = 0;
const PAGE_SIZE = 10;
let currentFilter = 'all';
let selectedImageFile = null;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getCurrentProfile();

  // Render sidebar
  document.getElementById('sidebar').innerHTML = renderSidebar(currentProfile, 'feed');

  // Set compose avatar
  document.getElementById('compose-avatar').src = avatarUrl(currentProfile?.avatar_url);

  await loadPosts();
  setupRealtime();
}

window.setFilter = function(f) {
  currentFilter = f;
  document.getElementById('filter-all').className = `btn btn-sm ${f === 'all' ? 'btn-primary' : 'btn-ghost'}`;
  document.getElementById('filter-friends').className = `btn btn-sm ${f === 'friends' ? 'btn-primary' : 'btn-ghost'}`;
  postOffset = 0;
  document.getElementById('feed-container').innerHTML = '<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';
  loadPosts();
};

async function loadPosts() {
  let query = supabase
    .from('posts')
    .select(`
      *,
      author:profiles!author_id(id, full_name, username, avatar_url),
      wall_owner:profiles!wall_owner_id(id, full_name, username)
    `)
    .order('created_at', { ascending: false })
    .range(postOffset, postOffset + PAGE_SIZE - 1);

  if (currentFilter === 'friends') {
    // Get friend IDs
    const { data: friends } = await supabase
      .from('friendships')
      .select('requester_id, addressee_id')
      .or(`requester_id.eq.${currentUser.id},addressee_id.eq.${currentUser.id}`)
      .eq('status', 'accepted');

    const friendIds = (friends || []).map(f =>
      f.requester_id === currentUser.id ? f.addressee_id : f.requester_id
    );
    friendIds.push(currentUser.id);
    query = query.in('author_id', friendIds);
  }

  const { data: posts, error } = await query;
  if (error) { toast('Failed to load posts', 'error'); return; }

  // Get user likes
  if (posts?.length) {
    const { data: userLikes } = await supabase
      .from('likes')
      .select('post_id')
      .eq('user_id', currentUser.id)
      .in('post_id', posts.map(p => p.id));

    const likedSet = new Set((userLikes || []).map(l => l.post_id));
    posts.forEach(p => p.user_liked = likedSet.has(p.id));
  }

  const container = document.getElementById('feed-container');
  if (postOffset === 0) container.innerHTML = '';

  if (!posts?.length && postOffset === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📰</div>
        <h3>No posts yet</h3>
        <p>Follow some people or post something yourself!</p>
      </div>
    `;
    return;
  }

  posts.forEach(post => {
    container.insertAdjacentHTML('beforeend', renderPost(post, currentUser.id));
  });

  const loadMoreWrap = document.getElementById('load-more-wrap');
  loadMoreWrap.style.display = posts?.length === PAGE_SIZE ? 'block' : 'none';
  postOffset += posts.length;
}

window.loadMorePosts = function() {
  loadPosts();
};

// ── Compose ──
window.expandCompose = function() {
  const input = document.getElementById('compose-text');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  input.style.overflow = 'auto';
  document.getElementById('compose-footer').style.display = 'flex';
};

document.getElementById('compose-text')?.addEventListener('input', function() {
  window.expandCompose();
  const len = this.value.length;
  const el = document.getElementById('char-count');
  el.textContent = `${len} / 2000`;
  el.style.color = len > 1800 ? 'var(--red)' : 'var(--text3)';
});

window.previewImage = function(input) {
  if (!input.files || !input.files[0]) return;
  selectedImageFile = input.files[0];
  const url = URL.createObjectURL(selectedImageFile);
  const img = document.getElementById('image-preview-img');
  img.src = url;
  img.onload = function() {
    document.getElementById('image-preview').style.display = 'block';
  };
  // also expand compose if not already
  window.expandCompose();
};

window.clearImage = function() {
  selectedImageFile = null;
  const inp = document.getElementById('post-image-input');
  if (inp) inp.value = '';
  const prev = document.getElementById('image-preview');
  if (prev) prev.style.display = 'none';
  const img = document.getElementById('image-preview-img');
  if (img) img.src = '';
};

window.submitPost = async function() {
  const content = document.getElementById('compose-text').value.trim();
  if (!content && !selectedImageFile) { toast('Write something first!', 'info'); return; }
  if (content.length > 2000) { toast('Post is too long', 'error'); return; }

  const btn = document.getElementById('post-submit-btn');
  btn.disabled = true;
  btn.textContent = selectedImageFile ? 'Uploading...' : 'Posting...';

  let imageUrl = null;
  if (selectedImageFile) {
    try {
      const ext  = selectedImageFile.name.split('.').pop();
      const path = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
      const { error: upErr } = await supabase.storage
        .from('posts')
        .upload(path, selectedImageFile, { cacheControl: '3600', upsert: false });
      if (upErr) throw upErr;
      imageUrl = supabase.storage.from('posts').getPublicUrl(path).data.publicUrl;
    } catch (e) {
      toast('Image upload failed: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = 'Post';
      return;
    }
  }

  const { data: post, error } = await supabase.from('posts').insert({
    author_id: currentUser.id,
    wall_owner_id: currentUser.id,
    content: content || '',
    image_url: imageUrl,
  }).select('*, author:profiles!author_id(id, full_name, username, avatar_url)').single();

  btn.disabled = false; btn.textContent = 'Post';
  if (error) { toast('Failed to post: ' + error.message, 'error'); return; }

  document.getElementById('compose-text').value = '';
  document.getElementById('compose-text').style.height = '48px';
  document.getElementById('compose-footer').style.display = 'none';
  document.getElementById('char-count').textContent = '0 / 2000';
  clearImage();

  post.user_liked = false;
  const container = document.getElementById('feed-container');
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();
  container.insertAdjacentHTML('afterbegin', renderPost(post, currentUser.id));
  toast('Posted!', 'success');
};

// ── Post interactions ──
window.handleLike = async function(btn, postId) {
  const isLiked = btn.classList.contains('liked');
  const countEl = btn.querySelector('.count');

  if (isLiked) {
    btn.classList.remove('liked');
    btn.innerHTML = `🤍 <span class="count">${Math.max(0, parseInt(countEl.textContent) - 1)}</span>`;
    await supabase.from('likes').delete().match({ user_id: currentUser.id, post_id: postId });
  } else {
    btn.classList.add('liked');
    btn.innerHTML = `❤️ <span class="count">${parseInt(countEl.textContent) + 1}</span>`;
    await supabase.from('likes').insert({ user_id: currentUser.id, post_id: postId });
  }
};

window.toggleComments = async function(btn, postId) {
  const container = document.getElementById(`comments-${postId}`);
  if (container.style.display !== 'none') {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  container.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:13px">Loading...</div>';

  const { data: comments } = await supabase
    .from('comments')
    .select('*, author:profiles!author_id(id, full_name, avatar_url)')
    .eq('post_id', postId)
    .order('created_at', { ascending: true });

  container.innerHTML = `
    <div class="comments-section">
      ${(comments || []).map(c => `
        <div class="comment">
          <img class="avatar avatar-sm" src="${avatarUrl(c.author?.avatar_url)}" alt="">
          <div class="comment-body">
            <div class="comment-author">
              <a href="../pages/profile.html?id=${c.author_id}">${c.author?.full_name || 'User'}</a>
            </div>
            <div class="comment-text">${c.content}</div>
            <div class="comment-meta">${timeAgo(c.created_at)}</div>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text3);font-size:13px;padding:8px 0">No comments yet</p>'}
      <div class="comment-input-row">
        <img class="avatar avatar-sm" src="${avatarUrl(currentProfile?.avatar_url)}" alt="">
        <input type="text" id="comment-input-${postId}" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')submitComment('${postId}')">
        <button class="btn btn-primary btn-sm" onclick="submitComment('${postId}')">Send</button>
      </div>
    </div>
  `;
};

window.submitComment = async function(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;

  const { data: comment, error } = await supabase.from('comments').insert({
    post_id: postId,
    author_id: currentUser.id,
    content,
  }).select('*, author:profiles!author_id(id, full_name, avatar_url)').single();

  if (error) { toast('Failed to comment', 'error'); return; }
  input.value = '';

  const section = document.querySelector(`#comments-${postId} .comments-section`);
  const inputRow = section.querySelector('.comment-input-row');
  const commentEl = document.createElement('div');
  commentEl.className = 'comment';
  commentEl.innerHTML = `
    <img class="avatar avatar-sm" src="${avatarUrl(comment.author?.avatar_url)}" alt="">
    <div class="comment-body">
      <div class="comment-author"><a href="../pages/profile.html?id=${comment.author_id}">${comment.author?.full_name || 'User'}</a></div>
      <div class="comment-text">${comment.content}</div>
      <div class="comment-meta">just now</div>
    </div>
  `;
  section.insertBefore(commentEl, inputRow);
};

window.togglePostMenu = function(btn, postId) {
  const { openDropdown } = window._appUtils || {};
  const items = [
    { icon: '✏️', label: 'Edit post', action: () => editPost(postId) },
    { icon: '🗑️', label: 'Delete post', danger: true, action: () => deletePost(postId) },
  ];
  const menu = document.createElement('div');
  menu.className = 'dropdown-menu';
  items.forEach(item => {
    const el = document.createElement('button');
    el.className = `dropdown-item${item.danger ? ' danger' : ''}`;
    el.innerHTML = `${item.icon} ${item.label}`;
    el.onclick = () => { item.action(); menu.remove(); };
    menu.appendChild(el);
  });
  btn.parentElement.style.position = 'relative';
  btn.parentElement.appendChild(menu);
  setTimeout(() => document.addEventListener('click', function close(e) {
    if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', close); }
  }, { once: false }), 10);
};

window.deletePost = async function(postId) {
  if (!confirm('Delete this post?')) return;
  await supabase.from('posts').delete().eq('id', postId);
  document.querySelector(`[data-post-id="${postId}"]`)?.remove();
  toast('Post deleted', 'success');
};

window.editPost = function(postId) {
  const card = document.querySelector(`[data-post-id="${postId}"]`);
  const contentEl = card.querySelector('.post-content');
  const oldContent = contentEl.textContent;
  const textarea = document.createElement('textarea');
  textarea.className = 'compose-input';
  textarea.value = oldContent;
  textarea.style.margin = '0 16px 12px';
  contentEl.replaceWith(textarea);
  textarea.focus();

  const footer = document.createElement('div');
  footer.style.cssText = 'padding:0 16px 12px;display:flex;gap:8px;justify-content:flex-end';
  footer.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="cancelEdit('${postId}')">Cancel</button>
    <button class="btn btn-primary btn-sm" onclick="saveEdit('${postId}')">Save</button>
  `;
  textarea.insertAdjacentElement('afterend', footer);
  card._editFooter = footer;
  card._editTextarea = textarea;
  card._oldContent = oldContent;
};

window.cancelEdit = function(postId) {
  const card = document.querySelector(`[data-post-id="${postId}"]`);
  const newContent = document.createElement('div');
  newContent.className = 'post-content';
  newContent.textContent = card._oldContent;
  card._editTextarea.replaceWith(newContent);
  card._editFooter.remove();
};

window.saveEdit = async function(postId) {
  const card = document.querySelector(`[data-post-id="${postId}"]`);
  const content = card._editTextarea.value.trim();
  if (!content) return;
  await supabase.from('posts').update({ content }).eq('id', postId);
  const newContent = document.createElement('div');
  newContent.className = 'post-content';
  newContent.textContent = content;
  card._editTextarea.replaceWith(newContent);
  card._editFooter.remove();
  toast('Post updated', 'success');
};

window.sharePost = function(postId) {
  navigator.clipboard.writeText(`${window.location.origin}../pages/post.html?id=${postId}`);
  toast('Link copied!', 'success');
};

window.openImageViewer = function(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
};

// ── Stories ──
async function loadStories() {
  const { data: friends } = await supabase
    .from('friendships')
    .select('requester_id, addressee_id')
    .or(`requester_id.eq.${currentUser.id},addressee_id.eq.${currentUser.id}`)
    .eq('status', 'accepted');

  const friendIds = (friends || []).map(f =>
    f.requester_id === currentUser.id ? f.addressee_id : f.requester_id
  );

  if (!friendIds.length) return;

  const { data: profiles } = await supabase
    .from('profiles')
    .select('id, full_name, avatar_url')
    .in('id', friendIds)
    .limit(8);

  const bar = document.getElementById('stories-bar');
  (profiles || []).forEach(p => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:64px';
    div.innerHTML = `
      <div style="width:60px;height:60px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer"
           onclick="window.location.href='../pages/profile.html?id=${p.id}'">
        <img style="width:100%;height:100%;border-radius:50%;border:2px solid var(--surface);object-fit:cover" 
             src="${avatarUrl(p.avatar_url)}" alt="">
      </div>
      <span style="font-size:11px;color:var(--text2);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.full_name}</span>
    `;
    bar.appendChild(div);
  });
}

// ── Realtime ──
function setupRealtime() {
  supabase.channel('feed')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, async (payload) => {
      if (payload.new.author_id === currentUser.id) return; // We already added it
      const { data: post } = await supabase
        .from('posts')
        .select('*, author:profiles!author_id(id, full_name, username, avatar_url)')
        .eq('id', payload.new.id)
        .single();
      if (post) {
        post.user_liked = false;
        const container = document.getElementById('feed-container');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();
        container.insertAdjacentHTML('afterbegin', renderPost(post, currentUser.id));
      }
    })
    .subscribe();
}

window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('open');
};

window.addStory = function() {
  toast('Stories coming soon!', 'info');
};

init().then(loadStories);
</script>
</body>
</html>
