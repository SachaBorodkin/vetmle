<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Friends</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .friends-layout { display:grid;grid-template-columns:220px 1fr;gap:12px;max-width:960px;margin:0 auto;padding:14px; }
    @media(max-width:720px){.friends-layout{grid-template-columns:1fr}.friends-side{display:none}}
    .fr-nav-item { display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-radius:var(--r-sm);transition:background var(--t); }
    .fr-nav-item:hover { background:var(--surface2); }
    .fr-nav-item.active { background:var(--blue-ll);color:var(--blue); }
  </style>
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
      <span style="font-weight:500">Friends</span>
    </div>
    <div class="friends-layout">
      <!-- Left nav -->
      <div class="friends-side">
        <div class="card" style="padding:6px 0">
          <div class="fr-nav-item active" id="fn-friends" onclick="loadSection('friends',this)">
            <span>My Friends</span><span id="fn-friends-count" style="font-size:11px;color:var(--text3)"></span>
          </div>
          <div class="fr-nav-item" id="fn-requests" onclick="loadSection('requests',this)">
            <span>Friend Requests</span><span id="fn-req-badge" style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;display:none">0</span>
          </div>
          <div class="fr-nav-item" id="fn-sent" onclick="loadSection('sent',this)">
            <span>Sent Requests</span>
          </div>
          <div class="fr-nav-item" id="fn-suggested" onclick="loadSection('suggested',this)">
            <span>Suggestions</span>
          </div>
        </div>
      </div>

      <!-- Main content -->
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div class="search-bar" style="flex:1">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search friends…" oninput="filterFriends(this.value)" style="padding:0 6px">
          </div>
        </div>
        <div id="section-title" style="font-size:14px;font-weight:500;margin-bottom:10px;color:var(--text2)">My Friends</div>
        <div id="friends-content">
          <div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader } from '../js/app.js';

let user, profile, allFriends = [], currentSection = 'friends';
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'friends');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'friends');
  loadSection('friends', document.getElementById('fn-friends'));

  // Load pending count
  const {count} = await supabase.from('friendships').select('id',{count:'exact',head:true}).eq('addressee_id',user.id).eq('status','pending');
  if (count) {
    const b = document.getElementById('fn-req-badge');
    b.textContent = count; b.style.display='inline';
  }
}

window.loadSection = async function(section, el) {
  currentSection = section;
  document.querySelectorAll('.fr-nav-item').forEach(e=>e.classList.remove('active'));
  if(el) el.classList.add('active');
  const titles = {friends:'My Friends',requests:'Friend Requests',sent:'Sent Requests',suggested:'People You May Know'};
  document.getElementById('section-title').textContent = titles[section]||section;
  document.getElementById('friends-content').innerHTML = '<div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>';

  if (section === 'friends') await loadFriends();
  else if (section === 'requests') await loadRequests();
  else if (section === 'sent') await loadSent();
  else if (section === 'suggested') await loadSuggested();
};

async function loadFriends() {
  const {data:fs} = await supabase.from('friendships')
    .select('id,requester_id,addressee_id')
    .or('requester_id.eq.'+user.id+',addressee_id.eq.'+user.id)
    .eq('status','accepted');
  const ids = (fs||[]).map(f=>f.requester_id===user.id?f.addressee_id:f.requester_id);
  document.getElementById('fn-friends-count').textContent = ids.length;
  if (!ids.length) {
    renderEmpty('No friends yet. Search for people to add!', 'friends-content');
    return;
  }
  const {data:pp} = await supabase.from('profiles').select('id,full_name,avatar_url,bio').in('id',ids).order('full_name').limit(50);
  allFriends = pp||[];
  renderPeople(allFriends, 'friend', fs);
}

async function loadRequests() {
  const {data:fs} = await supabase.from('friendships')
    .select('id,requester_id,addressee_id, requester:profiles!requester_id(id,full_name,avatar_url,bio)')
    .eq('addressee_id',user.id).eq('status','pending');
  const list = document.getElementById('friends-content');
  if (!(fs||[]).length) { list.innerHTML='<div class="empty-state"><h3>No pending requests</h3></div>'; return; }
  list.innerHTML = '<div class="friends-grid">'
    + (fs||[]).map(f=>`
    <div class="friend-card" style="text-align:center">
      <img src="${avatarUrl(f.requester?.avatar_url)}" alt="" onclick="location.href='../pages/profile.html?id=${f.requester_id}'" onerror="this.src='../assets/default-avatar.svg'">
      <div class="friend-card-name" style="margin-bottom:8px">${esc(f.requester?.full_name||'User')}</div>
      <div style="display:flex;gap:6px;justify-content:center">
        <button class="btn btn-primary btn-sm" onclick="acceptReq('${f.id}','${f.requester_id}',this)">Accept</button>
        <button class="btn btn-secondary btn-sm" onclick="declineReq('${f.id}',this)">Decline</button>
      </div>
    </div>`).join('')
    + '</div>';
}

async function loadSent() {
  const {data:fs} = await supabase.from('friendships')
    .select('id,addressee_id, addressee:profiles!addressee_id(id,full_name,avatar_url)')
    .eq('requester_id',user.id).eq('status','pending');
  const list = document.getElementById('friends-content');
  if (!(fs||[]).length) { list.innerHTML='<div class="empty-state"><h3>No sent requests</h3></div>'; return; }
  list.innerHTML = '<div class="friends-grid">'
    + (fs||[]).map(f=>`
    <div class="friend-card">
      <img src="${avatarUrl(f.addressee?.avatar_url)}" alt="" onclick="location.href='../pages/profile.html?id=${f.addressee_id}'" onerror="this.src='../assets/default-avatar.svg'">
      <div class="friend-card-name" style="margin-bottom:8px">${esc(f.addressee?.full_name||'User')}</div>
      <button class="btn btn-secondary btn-sm" onclick="cancelReq('${f.id}',this)">Cancel Request</button>
    </div>`).join('')
    + '</div>';
}

async function loadSuggested() {
  // Get users the current user has no connection with
  const {data:existingFs} = await supabase.from('friendships')
    .select('requester_id,addressee_id')
    .or('requester_id.eq.'+user.id+',addressee_id.eq.'+user.id);
  const connected = new Set([user.id]);
  (existingFs||[]).forEach(f=>{connected.add(f.requester_id);connected.add(f.addressee_id);});

  const {data:pp} = await supabase.from('profiles').select('id,full_name,avatar_url,bio').limit(40);
  const suggestions = (pp||[]).filter(p=>!connected.has(p.id)).slice(0,20);
  if (!suggestions.length) { renderEmpty('No suggestions right now','friends-content'); return; }
  allFriends = suggestions;
  renderPeople(suggestions, 'suggest', null);
}

function renderPeople(people, mode, fships) {
  const list = document.getElementById('friends-content');
  if (!people.length) { list.innerHTML='<div class="empty-state"><h3>No results</h3></div>'; return; }
  list.innerHTML = '<div class="friends-grid">'
    + people.map(p=>`
    <div class="friend-card">
      <img src="${avatarUrl(p.avatar_url)}" alt="" onclick="location.href='../pages/profile.html?id=${p.id}'" onerror="this.src='../assets/default-avatar.svg'">
      <div class="friend-card-name">${esc(p.full_name)}</div>
      ${p.bio ? '<div style="font-size:11px;color:var(--text3);margin:4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.bio)+'</div>' : ''}
      <div style="display:flex;gap:6px;justify-content:center;margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="location.href='../pages/messages.html?user=${p.id}'">Message</button>
        ${mode==='friend'
          ? '<button class="btn btn-secondary btn-sm" onclick="removeFriend(\''+p.id+'\',this)">Remove</button>'
          : '<button class="btn btn-secondary btn-sm" onclick="addFriend(\''+p.id+'\',this)">Add Friend</button>'}
      </div>
    </div>`).join('')
    + '</div>';
}

function renderEmpty(msg, id) {
  document.getElementById(id).innerHTML = '<div class="empty-state"><h3>'+msg+'</h3><a class="btn btn-primary btn-sm" href="../pages/search.html" style="margin-top:12px">Find People</a></div>';
}

window.filterFriends = q => {
  if (currentSection !== 'friends') return;
  renderPeople(!q.trim() ? allFriends : allFriends.filter(p=>(p.full_name||'').toLowerCase().includes(q.toLowerCase())), 'friend', null);
};

window.addFriend = async function(uid, btn) {
  btn.disabled = true; btn.textContent = 'Sent';
  const {error} = await supabase.from('friendships').insert({requester_id:user.id,addressee_id:uid,status:'pending'});
  if (error) { toast('Error: '+error.message,'error'); btn.disabled=false; btn.textContent='Add Friend'; return; }
  toast('Friend request sent!','success');
};

window.acceptReq = async function(fid, fromId, btn) {
  btn.disabled = true;
  await supabase.from('friendships').update({status:'accepted'}).eq('id',fid);
  toast('Friend added!','success');
  btn.closest('.friend-card').remove();
};

window.declineReq = async function(fid, btn) {
  await supabase.from('friendships').delete().eq('id',fid);
  btn.closest('.friend-card').remove();
  toast('Request declined','info');
};

window.cancelReq = async function(fid, btn) {
  await supabase.from('friendships').delete().eq('id',fid);
  btn.closest('.friend-card').remove();
  toast('Request cancelled','info');
};

window.removeFriend = async function(uid, btn) {
  if (!confirm('Remove friend?')) return;
  await supabase.from('friendships').delete()
    .or('and(requester_id.eq.'+user.id+',addressee_id.eq.'+uid+'),and(requester_id.eq.'+uid+',addressee_id.eq.'+user.id+')');
  btn.closest('.friend-card').remove();
  toast('Friend removed','info');
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
