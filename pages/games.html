<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Games</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
    .game-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all .18s; text-align:center; }
    .game-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 12px 36px rgba(0,0,0,.4); }
    .game-icon { font-size:56px; padding:28px 0 12px; display:block; }
    .game-name { font-weight:700; font-size:15px; padding:0 12px 6px; }
    .game-desc { font-size:12px; color:var(--text3); padding:0 12px 16px; }
    .game-btn { margin:0 12px 16px; width:calc(100% - 24px); }
    /* ---- SNAKE ---- */
    #snake-canvas { background:#0a0f1e; border-radius:8px; display:block; margin:0 auto; }
    /* ---- 2048 ---- */
    .board-2048 { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; background:var(--surface3); padding:6px; border-radius:8px; width:280px; margin:0 auto; }
    .cell-2048 { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; background:var(--surface2); transition:all .1s; }
    /* ---- MEMORY ---- */
    .memory-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; max-width:320px; margin:0 auto; }
    .memory-card { aspect-ratio:1; border-radius:8px; cursor:pointer; position:relative; transform-style:preserve-3d; transition:transform .3s; }
    .memory-card.flipped { transform:rotateY(180deg); }
    .memory-face { position:absolute; inset:0; border-radius:8px; display:flex; align-items:center; justify-content:center; backface-visibility:hidden; font-size:28px; }
    .mem-back  { background:linear-gradient(135deg,var(--blue),#5c9ce6); }
    .mem-front { background:var(--surface2); transform:rotateY(180deg); }
  </style>
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px">&#9776;</button>
      <span style="font-weight:700">Games</span>
    </div>

    <div class="page page-wide" style="max-width:1040px;margin:0 auto;padding:14px" style="max-width:1000px">
      <h1 style="font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Mini Games</h1>
      <p style="color:var(--text3);font-size:13px;margin-bottom:20px">Play quick games right in VEtmle</p>

      <div id="game-lobby" class="games-grid">
        <div class="game-card">
          <span class="game-icon">&#127822;</span>
          <div class="game-name">Snake</div>
          <div class="game-desc">Classic snake — eat apples, grow longer!</div>
          <button class="btn btn-primary game-btn" onclick="openGame('snake')">Play</button>
        </div>
        <div class="game-card">
          <span class="game-icon">&#127183;</span>
          <div class="game-name">2048</div>
          <div class="game-desc">Merge tiles to reach 2048!</div>
          <button class="btn btn-primary game-btn" onclick="openGame('2048')">Play</button>
        </div>
        <div class="game-card">
          <span class="game-icon">&#129517;</span>
          <div class="game-name">Memory</div>
          <div class="game-desc">Match all pairs as fast as you can.</div>
          <button class="btn btn-primary game-btn" onclick="openGame('memory')">Play</button>
        </div>
        <div class="game-card">
          <span class="game-icon">&#9864;</span>
          <div class="game-name">Tic-Tac-Toe</div>
          <div class="game-desc">Play against a friend or CPU.</div>
          <button class="btn btn-primary game-btn" onclick="openGame('ttt')">Play</button>
        </div>
      </div>

      <!-- Game container -->
      <div id="game-container" style="display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <button class="btn btn-ghost btn-sm" onclick="closeGame()">&#8592; Back to Games</button>
          <span id="game-title" style="font-weight:700;font-size:16px"></span>
          <span id="game-score" style="margin-left:auto;font-weight:700;color:var(--accent)"></span>
        </div>
        <div id="game-area" style="display:flex;justify-content:center"></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { initMiniPlayer } from '../js/player.js';
import { supabase, requireAuth, getCurrentProfile } from '../js/supabase.js';
import { toast, renderSidebar } from '../js/app.js';

let currentUser, currentProfile;
async function init() {
  currentUser = await requireAuth(); if (!currentUser) return;
  currentProfile = await getCurrentProfile();
  initMiniPlayer();
  renderHeader(profile, 'games');
  document.getElementById('sidebar').innerHTML = renderSidebar(currentProfile, 'games');
}

window.openGame = function(id) {
  document.getElementById('game-lobby').style.display = 'none';
  document.getElementById('game-container').style.display = 'block';
  const titles = {snake:'Snake',2048:'2048',memory:'Memory Match',ttt:'Tic-Tac-Toe'};
  document.getElementById('game-title').textContent = titles[id]||id;
  document.getElementById('game-score').textContent = '';
  const area = document.getElementById('game-area');
  area.innerHTML = '';
  if (id==='snake')  initSnake(area);
  if (id==='2048')   init2048(area);
  if (id==='memory') initMemory(area);
  if (id==='ttt')    initTTT(area);
};

window.closeGame = function() {
  stopSnake();
  document.getElementById('game-lobby').style.display = 'grid';
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('game-area').innerHTML = '';
};

// ══ SNAKE ═══════════════════════════════════════════════
let snakeInterval = null;
function stopSnake() { clearInterval(snakeInterval); snakeInterval = null; }
function initSnake(area) {
  const SZ = 14, COLS = 24, ROWS = 20;
  const canvas = document.createElement('canvas');
  canvas.id = 'snake-canvas'; canvas.width = COLS*SZ; canvas.height = ROWS*SZ;
  area.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let snake = [{x:12,y:10},{x:11,y:10},{x:10,y:10}], dir = {x:1,y:0}, next = {x:1,y:0};
  let food = randomFood(), score = 0, running = false;

  function randomFood() {
    let p; do { p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; } while(snake.some(s=>s.x===p.x&&s.y===p.y));
    return p;
  }
  function draw() {
    ctx.fillStyle = '#0a0f1e'; ctx.fillRect(0,0,canvas.width,canvas.height);
    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,.03)';
    for(let x=0;x<COLS;x++){ctx.beginPath();ctx.moveTo(x*SZ,0);ctx.lineTo(x*SZ,canvas.height);ctx.stroke();}
    for(let y=0;y<ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*SZ);ctx.lineTo(canvas.width,y*SZ);ctx.stroke();}
    // Snake
    snake.forEach((s,i) => {
      const alpha = 1 - (i/snake.length)*0.4;
      ctx.fillStyle = i===0 ? '#5b7fff' : `rgba(91,127,255,${alpha})`;
      ctx.beginPath(); ctx.roundRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,3); ctx.fill();
    });
    // Food
    ctx.fillStyle = '#f55d6e'; ctx.beginPath(); ctx.arc(food.x*SZ+SZ/2, food.y*SZ+SZ/2, SZ/2-1, 0, Math.PI*2); ctx.fill();
    // Score overlay
    ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.font = '13px Manrope,sans-serif';
    ctx.fillText('Score: '+score, 8, 18);
    if (!running) {
      ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Nunito,sans-serif'; ctx.textAlign='center';
      ctx.fillText(score===0?'Press Arrow Keys to Start':'Game Over — Score: '+score, canvas.width/2, canvas.height/2-10);
      ctx.font = '14px Manrope,sans-serif'; ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.fillText(score>0?'Press Space to restart':'',canvas.width/2,canvas.height/2+20);
      ctx.textAlign='left';
    }
  }
  function step() {
    dir = {...next};
    const head = {x:(snake[0].x+dir.x+COLS)%COLS, y:(snake[0].y+dir.y+ROWS)%ROWS};
    if (snake.slice(1).some(s=>s.x===head.x&&s.y===head.y)) { running=false; clearInterval(snakeInterval); draw(); return; }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) { score++; food=randomFood(); document.getElementById('game-score').textContent='Score: '+score; }
    else snake.pop();
    draw();
  }
  document.addEventListener('keydown', function snakeKey(e) {
    if(!document.getElementById('snake-canvas')) { document.removeEventListener('keydown',snakeKey); return; }
    const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
    if (map[e.key]) { e.preventDefault(); if(!running){running=true; snakeInterval=setInterval(step,100);} const nd=map[e.key]; if(nd.x!==-dir.x||nd.y!==-dir.y) next=nd; }
    if (e.key===' ' && !running && score>0) { snake=[{x:12,y:10},{x:11,y:10},{x:10,y:10}]; dir={x:1,y:0}; next={x:1,y:0}; food=randomFood(); score=0; running=true; snakeInterval=setInterval(step,100); }
  });
  draw();
}

// ══ 2048 ══════════════════════════════════════════════════
function init2048(area) {
  let grid = Array.from({length:4},()=>Array(4).fill(0)), score=0;
  const colors = {0:'var(--surface2)',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
  const textColor = v => v<=4?'#776e65':'#f9f6f2';
  function spawn() { const empty=[]; for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) empty.push([r,c]); if(!empty.length) return; const [r,c]=empty[Math.floor(Math.random()*empty.length)]; grid[r][c]=Math.random()<0.9?2:4; }
  function render() {
    div.innerHTML='';
    grid.forEach(row=>row.forEach(v=>{
      const cell=document.createElement('div'); cell.className='cell-2048';
      cell.style.background=colors[v]||'#3c3a32'; cell.style.color=textColor(v); cell.style.fontSize=v>=1000?'14px':v>=100?'16px':'18px';
      cell.textContent=v||''; div.appendChild(cell);
    }));
    document.getElementById('game-score').textContent='Score: '+score;
  }
  function slide(row){const r=row.filter(v=>v);let merged=false;for(let i=0;i<r.length-1;i++){if(!merged&&r[i]===r[i+1]){r[i]*=2;score+=r[i];r.splice(i+1,1);merged=true;}else merged=false;}while(r.length<4)r.push(0);return r;}
  function move(dir){
    let moved=false;
    if(dir==='left'||dir==='right'){grid=grid.map(row=>{const s=dir==='right'?slide([...row].reverse()).reverse():slide([...row]);if(s.some((v,i)=>v!==row[i]))moved=true;return s;});}
    else{for(let c=0;c<4;c++){let col=grid.map(r=>r[c]);const s=dir==='down'?slide([...col].reverse()).reverse():slide([...col]);if(s.some((v,i)=>v!==col[i]))moved=true;s.forEach((v,r)=>grid[r][c]=v);}}
    if(moved){spawn();render();}
    if(grid.flat().includes(2048)) setTimeout(()=>toast('You reached 2048! 🎉','success'),100);
  }
  spawn(); spawn();
  const div=document.createElement('div'); div.className='board-2048'; area.appendChild(div);
  render();
  document.addEventListener('keydown', function g2048(e){
    if(!document.querySelector('.board-2048')){document.removeEventListener('keydown',g2048);return;}
    const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(map[e.key]){e.preventDefault();move(map[e.key]);}
  });
}

// ══ MEMORY ════════════════════════════════════════════════
function initMemory(area) {
  const emojis = ['🍕','🎸','🌈','🚀','🦊','🎮','🍦','🦋'];
  let cards = [...emojis,...emojis].sort(()=>Math.random()-.5).map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  let first=null,second=null,moves=0,locked=false;
  const grid = document.createElement('div'); grid.className='memory-grid'; area.appendChild(grid);
  function render() {
    grid.innerHTML = '';
    cards.forEach((c,i)=>{
      const el=document.createElement('div'); el.className='memory-card'+(c.flipped||c.matched?' flipped':'');
      el.innerHTML='<div class="memory-face mem-back"><svg width="20" height="20" viewBox="0 0 24 24" fill="white" opacity=".3"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg></div><div class="memory-face mem-front">'+c.emoji+'</div>';
      el.onclick=()=>flip(i); grid.appendChild(el);
    });
    document.getElementById('game-score').textContent='Moves: '+moves;
    if(cards.every(c=>c.matched)) setTimeout(()=>toast('You matched all pairs in '+moves+' moves! 🎉','success'),300);
  }
  function flip(i){
    if(locked||cards[i].flipped||cards[i].matched) return;
    cards[i].flipped=true;
    if(!first){first=i;render();return;}
    second=i; moves++; locked=true; render();
    if(cards[first].emoji===cards[second].emoji){cards[first].matched=cards[second].matched=true;first=second=null;locked=false;render();}
    else setTimeout(()=>{cards[first].flipped=cards[second].flipped=false;first=second=null;locked=false;render();},900);
  }
  render();
}

// ══ TIC-TAC-TOE ══════════════════════════════════════════
function initTTT(area) {
  let board = Array(9).fill(null), xTurn = true, over = false;
  const wrap = document.createElement('div'); wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:12px'; area.appendChild(wrap);
  const status = document.createElement('div'); status.style.cssText='font-weight:700;font-size:16px'; wrap.appendChild(status);
  const grid = document.createElement('div'); grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:240px'; wrap.appendChild(grid);
  const restart = document.createElement('button'); restart.className='btn btn-ghost btn-sm'; restart.textContent='Restart'; restart.onclick=()=>{board=Array(9).fill(null);xTurn=true;over=false;render();}; wrap.appendChild(restart);
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function checkWin(b,p){return wins.some(w=>w.every(i=>b[i]===p));}
  function render(){
    grid.innerHTML=''; board.forEach((v,i)=>{
      const cell=document.createElement('div');
      cell.style.cssText='aspect-ratio:1;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;cursor:pointer;transition:all .15s;border:2px solid '+(v?'transparent':'var(--border)');
      cell.style.color=v==='X'?'var(--accent)':'#f55d6e';
      cell.textContent=v||'';
      cell.onmouseenter=()=>{if(!v&&!over)cell.style.background='var(--surface3)';};
      cell.onmouseleave=()=>{cell.style.background='var(--surface2)';};
      cell.onclick=()=>{
        if(v||over)return; board[i]=xTurn?'X':'O'; xTurn=!xTurn;
        if(checkWin(board,board[i])){over=true;status.textContent=(board[i]==='X'?'❌':'⭕')+' wins!';render();return;}
        if(board.every(Boolean)){over=true;status.textContent='Draw!';render();return;}
        // CPU move
        if(!xTurn){
          let best=null;
          // Try to win
          for(let j=0;j<9;j++){if(!board[j]){board[j]='O';if(checkWin(board,'O')){best=j;board[j]=null;break;}board[j]=null;}}
          // Block player
          if(best===null)for(let j=0;j<9;j++){if(!board[j]){board[j]='X';if(checkWin(board,'X')){best=j;board[j]=null;break;}board[j]=null;}}
          // Center
          if(best===null&&!board[4])best=4;
          // Random
          if(best===null){const e=board.map((v,i)=>!v?i:-1).filter(i=>i>=0);best=e[Math.floor(Math.random()*e.length)];}
          board[best]='O'; xTurn=true;
          if(checkWin(board,'O')){over=true;status.textContent='⭕ CPU wins!';render();return;}
          if(board.every(Boolean)){over=true;status.textContent='Draw!';render();return;}
        }
        render();
      };
      grid.appendChild(cell);
    });
    if(!over) status.textContent = xTurn ? '❌ Your turn (X)' : '⭕ CPU thinking...';
  }
  render();
}

window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
