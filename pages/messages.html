<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Messages</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" style="padding-bottom:0">

    <div style="height:calc(100vh - var(--header-h));padding:12px 14px;display:flex;flex-direction:column">
      <div class="messages-layout">

        <!-- Left: conversations list -->
        <div class="conversations-panel">
          <div class="conversations-search">
            <div class="search-bar" style="height:32px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" placeholder="Search…" oninput="filterConvs(this.value)" style="padding:0 6px;font-size:12.5px">
            </div>
          </div>
          <div id="conv-list" style="flex:1;overflow-y:auto">
            <div style="display:flex;justify-content:center;padding:28px"><div class="spinner"></div></div>
          </div>
          <div style="padding:9px;border-top:1px solid var(--border);flex-shrink:0">
            <button class="btn btn-primary btn-block btn-sm" onclick="openNewChat()">+ New Message</button>
          </div>
        </div>

        <!-- Right: chat panel -->
        <div class="chat-panel" id="chat-panel">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:10px">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span style="font-size:13px">Select a conversation</span>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader, createModal } from '../js/app.js';
import { initMiniPlayer } from '../js/player.js';

let user, profile, convs = [], activeConv = null, msgChannel = null;
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'messages');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'messages');
  initMiniPlayer();

  await loadConversations();

  const uid = new URLSearchParams(location.search).get('user');
  if (uid) openChatWith(uid);
}

// ── Conversations list ─────────────────────────────────────────
async function loadConversations() {
  const {data:msgs} = await supabase.from('messages')
    .select('sender_id,receiver_id,content,created_at,read')
    .or('sender_id.eq.'+user.id+',receiver_id.eq.'+user.id)
    .order('created_at',{ascending:false});

  // Deduplicate to one entry per partner, keeping most-recent message
  const seen = new Map();
  (msgs||[]).forEach(m => {
    const partner = m.sender_id===user.id ? m.receiver_id : m.sender_id;
    if (!seen.has(partner)) seen.set(partner, m);
  });

  if (!seen.size) {
    document.getElementById('conv-list').innerHTML =
      '<div style="padding:18px 12px;color:var(--text3);font-size:12.5px;text-align:center">No conversations yet</div>';
    return;
  }

  const ids = [...seen.keys()];
  const {data:pp} = await supabase.from('profiles').select('id,full_name,avatar_url').in('id',ids);
  const pMap = Object.fromEntries((pp||[]).map(p=>[p.id,p]));

  convs = ids.map(id=>({
    partner: pMap[id] || {id, full_name:'Deleted User', avatar_url:null},
    lastMsg: seen.get(id),
  }));
  renderConvList(convs);
}

function renderConvList(list) {
  const el = document.getElementById('conv-list');
  if (!list.length) {
    el.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12.5px;text-align:center">No conversations</div>';
    return;
  }
  el.innerHTML = list.map(({partner, lastMsg}) => {
    const avt    = avatarUrl(partner.avatar_url);
    const isOwn  = lastMsg?.sender_id === user.id;
    const preview= (isOwn ? 'You: ' : '') + (lastMsg?.content||'').slice(0,38);
    const unread = !isOwn && lastMsg && !lastMsg.read;
    return `<div class="conv-item${activeConv===partner.id?' active':''}" id="ci-${partner.id}" onclick="openChat('${partner.id}')">
      <img src="${avt}" alt="" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0"
           onerror="this.src='../assets/default-avatar.svg'">
      <div style="flex:1;min-width:0">
        <div class="conv-name${unread?' ':''}${unread?'font-weight:600':''}"
             style="${unread?'font-weight:600':''}">
          ${esc(partner.full_name||'User')}
        </div>
        <div class="conv-last">${esc(preview)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <div class="conv-time">${timeAgo(lastMsg?.created_at||'')}</div>
        ${unread ? '<div class="conv-unread">●</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

window.filterConvs = q => {
  const lq = q.toLowerCase();
  renderConvList(q ? convs.filter(c=>(c.partner.full_name||'').toLowerCase().includes(lq)) : convs);
};

// ── Open chat ──────────────────────────────────────────────────
window.openChat = async function(partnerId) {
  activeConv = partnerId;
  // Highlight active conv
  document.querySelectorAll('.conv-item').forEach(c=>c.classList.remove('active'));
  document.getElementById('ci-'+partnerId)?.classList.add('active');

  const {data:partner} = await supabase.from('profiles')
    .select('id,full_name,avatar_url').eq('id',partnerId).single();

  const avt = avatarUrl(partner?.avatar_url);

  document.getElementById('chat-panel').innerHTML = `
    <div class="chat-header">
      <img src="${avt}" alt=""
        style="width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0"
        onclick="location.href='../pages/profile.html?id=${partnerId}'"
        onerror="this.src='../assets/default-avatar.svg'">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="location.href='../pages/profile.html?id=${partnerId}'">
        <div style="font-weight:500;font-size:13.5px">${esc(partner?.full_name||'User')}</div>
        <div style="font-size:11px;color:var(--text3)">view profile</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input-area">
      <textarea id="chat-inp" class="chat-input" placeholder="Write a message…" rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${partnerId}')}"></textarea>
      <button class="chat-send-btn" onclick="sendMsg('${partnerId}')" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      </button>
    </div>`;

  await loadMessages(partnerId);
  subscribeToMessages(partnerId);
  // Mark messages as read
  supabase.from('messages').update({read:true})
    .eq('receiver_id',user.id).eq('sender_id',partnerId).eq('read',false);
};

// ── Load messages ──────────────────────────────────────────────
async function loadMessages(partnerId) {
  const {data:msgs} = await supabase.from('messages')
    .select('*')
    .or(`and(sender_id.eq.${user.id},receiver_id.eq.${partnerId}),and(sender_id.eq.${partnerId},receiver_id.eq.${user.id})`)
    .order('created_at',{ascending:true})
    .limit(100);

  const box = document.getElementById('chat-msgs'); if (!box) return;

  if (!(msgs||[]).length) {
    box.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12.5px;padding:20px">No messages yet. Say hello!</div>';
    return;
  }

  // Group consecutive messages from same sender
  box.innerHTML = '';
  let lastSender = null;
  (msgs||[]).forEach(m => {
    const mine = m.sender_id === user.id;
    const showAvt = !mine && m.sender_id !== lastSender;
    box.insertAdjacentHTML('beforeend', msgBubble(m, showAvt));
    lastSender = m.sender_id;
  });
  box.scrollTop = box.scrollHeight;
}

function msgBubble(m, showAvatar=true) {
  const mine = m.sender_id === user.id;
  // For received messages we could show avatar, but VK style keeps it clean
  return `<div class="message-row${mine?' own':''}">
    <div>
      <div class="message-bubble">${esc(m.content)}</div>
      <div class="message-time">${timeAgo(m.created_at)}</div>
    </div>
  </div>`;
}

// ── Send ───────────────────────────────────────────────────────
window.sendMsg = async function(partnerId) {
  const inp = document.getElementById('chat-inp'); if (!inp) return;
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = ''; inp.style.height = 'auto';

  const {data:m, error} = await supabase.from('messages').insert({
    sender_id:user.id, receiver_id:partnerId, content:txt, read:false,
  }).select().single();
  if (error) { toast('Send failed','error'); return; }

  const box = document.getElementById('chat-msgs'); if (!box) return;
  box.insertAdjacentHTML('beforeend', msgBubble(m, false));
  box.scrollTop = box.scrollHeight;
  // Refresh conv list to show latest preview
  loadConversations();
};

// ── Realtime ───────────────────────────────────────────────────
function subscribeToMessages(partnerId) {
  if (msgChannel) supabase.removeChannel(msgChannel);
  msgChannel = supabase.channel('chat-'+partnerId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, payload => {
      const m = payload.new;
      const relevant = (m.sender_id===partnerId && m.receiver_id===user.id)
                    || (m.sender_id===user.id   && m.receiver_id===partnerId);
      if (!relevant || m.sender_id===user.id) return; // own messages already shown
      const box = document.getElementById('chat-msgs'); if (!box) return;
      box.insertAdjacentHTML('beforeend', msgBubble(m, false));
      box.scrollTop = box.scrollHeight;
      supabase.from('messages').update({read:true}).eq('id',m.id);
      loadConversations();
    }).subscribe();
}

// ── New chat ───────────────────────────────────────────────────
window.openChatWith = async function(uid) {
  const {data:p} = await supabase.from('profiles').select('id,full_name,avatar_url').eq('id',uid).single();
  if (!p) return;
  if (!convs.find(c=>c.partner.id===uid)) {
    convs.unshift({partner:p, lastMsg:{content:'',created_at:new Date().toISOString(),sender_id:'',read:true}});
    renderConvList(convs);
  }
  openChat(uid);
};

window.openNewChat = function() {
  createModal('New Message',
    `<div class="form-group"><label>Search people</label>
     <input id="nm-q" placeholder="Type a name…" oninput="searchForChat(this.value)" autocomplete="off"></div>
     <div id="nm-results" style="max-height:220px;overflow-y:auto;margin-top:4px"></div>`,
    ''
  );
};

window.searchForChat = async function(q) {
  if (q.length < 2) return;
  const {data:pp} = await supabase.from('profiles')
    .select('id,full_name,avatar_url')
    .ilike('full_name','%'+q+'%')
    .neq('id',user.id).limit(8);
  const res = document.getElementById('nm-results'); if (!res) return;
  if (!pp?.length) { res.innerHTML='<p style="color:var(--text3);font-size:12px;padding:8px 0">No users found</p>'; return; }
  res.innerHTML = pp.map(p=>`
    <div class="conv-item" onclick="document.querySelector('.modal-overlay').remove();openChatWith('${p.id}')">
      <img src="${avatarUrl(p.avatar_url)}" alt=""
           style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0"
           onerror="this.src='../assets/default-avatar.svg'">
      <div class="conv-name">${esc(p.full_name)}</div>
    </div>`).join('');
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
