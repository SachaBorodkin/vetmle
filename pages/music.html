<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Music</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .music-layout { display:grid; grid-template-columns:260px 1fr; gap:12px; max-width:1000px; margin:0 auto; padding:14px; }
    @media(max-width:720px){.music-layout{grid-template-columns:1fr}.music-sidebar{display:none}}
    .music-sidebar .widget { margin-bottom:0; }
    .tracks-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r); }
    .tracks-header { padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px; }
    .tracks-header h2 { font-size:14px;font-weight:500; }
    .track-list { padding:6px 0; }
    /* Player bar override for music page — always visible */
    .player-bar {
      position:fixed;bottom:0;left:var(--sidebar-w);right:0;
      height:62px;background:#191c22;border-top:1px solid var(--border);
      display:flex;align-items:center;gap:14px;padding:0 16px;
      z-index:600;
    }
    @media(max-width:720px){.player-bar{left:0}}
    .player-info { min-width:0;width:200px;flex-shrink:0; }
    .player-cover { width:42px;height:42px;border-radius:6px;object-fit:cover;background:var(--surface3);flex-shrink:0; }
    .player-controls { display:flex;align-items:center;gap:10px; }
    .volume-wrap { display:flex;align-items:center;gap:6px;flex-shrink:0;width:110px; }
    .volume-bar { flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer; }
    .volume-fill { height:100%;background:var(--blue);border-radius:2px; }
    .shuffle-btn, .repeat-btn { color:var(--text3);font-size:11px;padding:3px 6px;border-radius:3px;background:none;border:1px solid transparent;cursor:pointer; }
    .shuffle-btn.on,.repeat-btn.on { color:var(--blue);border-color:var(--blue);background:var(--blue-ll); }
  </style>
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
      <span style="font-weight:500">Music</span>
    </div>

    <div class="music-layout">
      <!-- Left: My library quick nav -->
      <div class="music-sidebar">
        <div class="widget">
          <div class="widget-title" style="border-bottom:none;padding-bottom:6px">My Music</div>
          <div class="widget-row" onclick="loadTab('all')" id="nav-all" style="border-radius:var(--r-sm)">
            <span style="font-size:15px">🎵</span>
            <span class="widget-row-name">All Music</span>
          </div>
          <div class="widget-row" onclick="loadTab('mine')" id="nav-mine" style="border-radius:var(--r-sm)">
            <span style="font-size:15px">📚</span>
            <span class="widget-row-name">My Library</span>
          </div>
          <div class="widget-row" onclick="loadTab('uploaded')" id="nav-uploaded" style="border-radius:var(--r-sm)">
            <span style="font-size:15px">☁️</span>
            <span class="widget-row-name">My Uploads</span>
          </div>
          <div style="padding:8px 12px;border-top:1px solid var(--border);margin-top:4px">
            <button class="btn btn-primary btn-sm btn-block" onclick="openUpload()">+ Upload Track</button>
          </div>
        </div>
      </div>

      <!-- Right: Track list -->
      <div>
        <!-- Mobile upload btn -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div class="search-bar" style="flex:1">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search tracks…" oninput="filterTracks(this.value)" style="padding:0 6px">
          </div>
          <button class="btn btn-primary btn-sm" onclick="openUpload()" style="flex-shrink:0">Upload</button>
        </div>

        <div class="tracks-card">
          <div class="tracks-header">
            <h2 id="tab-label">All Music</h2>
            <span id="track-count" style="font-size:12px;color:var(--text3)"></span>
          </div>
          <div class="track-list" id="track-list">
            <div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Player bar -->
<div class="player-bar" id="player-bar">
  <img class="player-cover" id="pl-cover" src="../assets/default-avatar.svg" alt="">
  <div class="player-info">
    <div id="pl-title" style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">No track playing</div>
    <div id="pl-artist" style="font-size:11px;color:var(--text3)"></div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn shuffle-btn" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle">⇌</button>
    <button class="ctrl-btn" onclick="playPrev()" title="Previous"><?xml version="1.0"?>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="play-btn" id="pl-play" onclick="togglePlay()">
      <svg id="pl-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="ctrl-btn" onclick="playNext()" title="Next">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="ctrl-btn repeat-btn" id="repeat-btn" onclick="toggleRepeat()" title="Repeat">↺</button>
  </div>
  <div class="progress-wrap">
    <span class="time-label" id="pl-cur">0:00</span>
    <div class="progress-bar" id="pl-bar" onclick="seekTo(event)">
      <div class="progress-fill" id="pl-fill" style="width:0%"></div>
    </div>
    <span class="time-label" id="pl-dur">0:00</span>
  </div>
  <div class="volume-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <div class="volume-bar" id="vol-bar" onclick="setVolume(event)">
      <div class="volume-fill" id="vol-fill" style="width:80%"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader, createModal } from '../js/app.js';

let user, profile, allTracks = [], queue = [], qIdx = 0, currentTab = 'all';
let shuffle = false, repeat = false;
const audio = new Audio();
audio.volume = 0.8;

function fmt(s) { if (!s || isNaN(s)) return '0:00'; const m=Math.floor(s/60); return m+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60); }
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'music');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'music');
  loadTab('all');
  setupAudio();
}

function setupAudio() {
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('pl-fill').style.width = pct + '%';
    document.getElementById('pl-cur').textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('pl-dur').textContent = fmt(audio.duration);
  });
  audio.addEventListener('play',  updatePlayBtn);
  audio.addEventListener('pause', updatePlayBtn);
  audio.addEventListener('ended', () => {
    if (repeat) { audio.currentTime = 0; audio.play(); return; }
    playNext();
  });
}

function updatePlayBtn() {
  const icon = document.getElementById('pl-icon');
  if (audio.paused) {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  } else {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }
}

window.loadTab = async function(tab) {
  currentTab = tab;
  const labels = {all:'All Music',mine:'My Library',uploaded:'My Uploads'};
  document.getElementById('tab-label').textContent = labels[tab]||tab;
  ['all','mine','uploaded'].forEach(t => {
    const el = document.getElementById('nav-'+t);
    if (el) el.style.background = t===tab ? 'var(--blue-ll)' : '';
  });
  document.getElementById('track-list').innerHTML = '<div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>';

  let data;
  if (tab === 'all') {
    const r = await supabase.from('music_tracks').select('*, uploader:profiles!uploader_id(id,full_name)').order('plays',{ascending:false}).limit(60);
    data = r.data;
  } else if (tab === 'mine') {
    const r = await supabase.from('user_music').select('track:music_tracks(*,uploader:profiles!uploader_id(id,full_name))').eq('user_id',user.id).order('created_at',{ascending:false});
    data = (r.data||[]).map(m=>m.track).filter(Boolean);
  } else {
    const r = await supabase.from('music_tracks').select('*, uploader:profiles!uploader_id(id,full_name)').eq('uploader_id',user.id).order('created_at',{ascending:false});
    data = r.data;
  }

  allTracks = data || [];
  renderTracks(allTracks);
};

window.filterTracks = q => {
  if (!q.trim()) { renderTracks(allTracks); return; }
  const lq = q.toLowerCase();
  renderTracks(allTracks.filter(t => (t.title+' '+t.artist+' '+(t.album||'')).toLowerCase().includes(lq)));
};

function renderTracks(tracks) {
  const list = document.getElementById('track-list');
  document.getElementById('track-count').textContent = tracks.length + ' tracks';
  if (!tracks.length) {
    list.innerHTML = '<div class="empty-state"><h3>No tracks yet</h3><p>Upload music using the button above</p></div>';
    return;
  }
  list.innerHTML = tracks.map((t,i) => {
    const cover = t.cover_url || '../assets/default-avatar.svg';
    const dur = t.duration ? fmt(t.duration) : '—';
    const plays = t.plays ? t.plays.toLocaleString() : '0';
    return '<div class="track-row" id="tr-'+t.id+'" onclick="playTrack(\''+t.id+'\','+i+')">'
      + '<span class="track-num">'+( (qIdx === i && audio.src && !audio.paused) ? '▶' : (i+1) )+'</span>'
      + '<img class="track-cover" src="'+cover+'" alt="" onerror="this.src=\'../assets/default-avatar.svg\'">'
      + '<div class="track-info">'
      + '<div class="track-title">'+esc(t.title)+'</div>'
      + '<div class="track-artist">'+esc(t.artist||'Unknown')+(t.album?' — '+esc(t.album):'')+'</div>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--text3);margin-right:10px">▶ '+plays+'</div>'
      + '<span class="track-duration">'+dur+'</span>'
      + '<div class="track-actions">'
      + '<button class="track-action-btn" onclick="event.stopPropagation();addToLibrary(\''+t.id+'\')" title="Save to library">+'
      + '</button>'
      + (t.uploader_id === user.id ? '<button class="track-action-btn" onclick="event.stopPropagation();deleteTrack(\''+t.id+'\')" title="Delete">✕</button>' : '')
      + '</div>'
      + '</div>';
  }).join('');
  queue = tracks;
}

window.playTrack = async function(tid, idx) {
  const track = queue.find(t=>t.id===tid);
  if (!track) return;
  qIdx = idx;

  // Get audio URL
  let url = track.audio_url;
  if (!url.startsWith('http')) {
    url = supabase.storage.from('music').getPublicUrl(url).data.publicUrl;
  }

  audio.src = url;
  audio.play().catch(e => toast('Playback error: '+e.message,'error'));

  // Update player bar UI
  document.getElementById('pl-cover').src  = track.cover_url || '../assets/default-avatar.svg';
  document.getElementById('pl-title').textContent  = track.title;
  document.getElementById('pl-artist').textContent = track.artist || '';

  // Highlight row
  document.querySelectorAll('.track-row').forEach(r=>r.classList.remove('playing'));
  const row = document.getElementById('tr-'+tid);
  if (row) row.classList.add('playing');

  // Increment plays
  supabase.from('music_tracks').update({plays:(track.plays||0)+1}).eq('id',tid);
  track.plays = (track.plays||0)+1;
};

window.togglePlay = function() {
  if (!audio.src) { if (queue.length) playTrack(queue[0].id,0); return; }
  if (audio.paused) audio.play().catch(()=>{});
  else audio.pause();
};

window.playNext = function() {
  if (!queue.length) return;
  let next;
  if (shuffle) { next = Math.floor(Math.random()*queue.length); }
  else { next = (qIdx+1) % queue.length; }
  playTrack(queue[next].id, next);
};

window.playPrev = function() {
  if (!queue.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const prev = shuffle ? Math.floor(Math.random()*queue.length) : (qIdx-1+queue.length) % queue.length;
  playTrack(queue[prev].id, prev);
};

window.seekTo = function(e) {
  const bar = document.getElementById('pl-bar');
  audio.currentTime = (e.offsetX / bar.offsetWidth) * (audio.duration || 0);
};

window.setVolume = function(e) {
  const bar = document.getElementById('vol-bar');
  const pct = Math.max(0, Math.min(1, e.offsetX / bar.offsetWidth));
  audio.volume = pct;
  document.getElementById('vol-fill').style.width = (pct*100)+'%';
};

window.toggleShuffle = function() {
  shuffle = !shuffle;
  document.getElementById('shuffle-btn').classList.toggle('on', shuffle);
};
window.toggleRepeat = function() {
  repeat = !repeat;
  document.getElementById('repeat-btn').classList.toggle('on', repeat);
};

window.addToLibrary = async function(tid) {
  const {error} = await supabase.from('user_music').insert({user_id:user.id,track_id:tid});
  if (error && error.code==='23505') { toast('Already in library','info'); return; }
  if (error) { toast('Error: '+error.message,'error'); return; }
  toast('Added to library!','success');
};

window.deleteTrack = async function(tid) {
  if (!confirm('Delete this track?')) return;
  await supabase.from('user_music').delete().eq('track_id',tid);
  await supabase.from('music_tracks').delete().eq('id',tid);
  allTracks = allTracks.filter(t=>t.id!==tid);
  queue = queue.filter(t=>t.id!==tid);
  renderTracks(allTracks);
  toast('Track deleted','success');
};

window.openUpload = function() {
  createModal('Upload Track',
    '<div class="form-group"><label>Title *</label><input id="ut" placeholder="Track title"></div>'
    +'<div class="form-group"><label>Artist *</label><input id="ua" placeholder="Artist name"></div>'
    +'<div class="form-group"><label>Album</label><input id="ual" placeholder="Album (optional)"></div>'
    +'<div class="form-group"><label>Audio file (MP3/WAV/OGG) *</label><input type="file" id="uf" accept="audio/*"></div>'
    +'<div class="form-group"><label>Cover image (optional)</label><input type="file" id="uc" accept="image/*"></div>',
    '<button class="btn btn-secondary btn-sm" onclick="document.querySelector(\'.modal-overlay\').remove()">Cancel</button>'
    +'<button class="btn btn-primary btn-sm" id="usub" onclick="submitUpload()">Upload</button>'
  );
};

window.submitUpload = async function() {
  const title  = document.getElementById('ut').value.trim();
  const artist = document.getElementById('ua').value.trim();
  const album  = document.getElementById('ual').value.trim();
  const aFile  = document.getElementById('uf').files[0];
  const cFile  = document.getElementById('uc').files[0];
  if (!title || !artist || !aFile) { toast('Title, artist and audio file required','error'); return; }

  const btn = document.getElementById('usub');
  btn.disabled = true; btn.textContent = 'Uploading…';
  try {
    // Upload audio
    const aExt = aFile.name.split('.').pop();
    const aPath = 'tracks/'+user.id+'-'+Date.now()+'.'+aExt;
    const {error:ae} = await supabase.storage.from('music').upload(aPath, aFile);
    if (ae) throw ae;
    const audioUrl = supabase.storage.from('music').getPublicUrl(aPath).data.publicUrl;

    // Get duration
    let duration = null;
    try {
      duration = await new Promise(res => {
        const a = new Audio(); a.onloadedmetadata = ()=>res(Math.round(a.duration));
        a.onerror = ()=>res(null); a.src = URL.createObjectURL(aFile);
      });
    } catch(e) {}

    // Upload cover
    let coverUrl = null;
    if (cFile) {
      const cp = 'covers/'+user.id+'-'+Date.now()+'.'+cFile.name.split('.').pop();
      const {error:ce} = await supabase.storage.from('music').upload(cp, cFile);
      if (!ce) coverUrl = supabase.storage.from('music').getPublicUrl(cp).data.publicUrl;
    }

    const {error:de} = await supabase.from('music_tracks').insert({
      uploader_id:user.id, title, artist, album:album||null,
      audio_url:audioUrl, cover_url:coverUrl, duration, plays:0,
    });
    if (de) throw de;

    document.querySelector('.modal-overlay')?.remove();
    toast('Track uploaded!','success');
    loadTab(currentTab);
  } catch(e) { toast('Upload failed: '+e.message,'error'); btn.disabled=false; btn.textContent='Upload'; }
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
