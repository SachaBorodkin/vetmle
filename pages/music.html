<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Music</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ── Music Player Bar ── */
    .player-bar {
      position: fixed;
      bottom: 0; left: var(--sidebar-w); right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 24px;
      height: 72px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }
    .player-bar.hidden { display: none; }
    .player-cover {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface3);
      flex-shrink: 0;
    }
    .player-info { min-width: 0; flex: 0 0 200px; }
    .player-title { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 11px; color: var(--text3); }
    .player-controls { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: center; }
    .ctrl-btn {
      background: none; border: none; color: var(--text2);
      cursor: pointer; transition: color .15s; display: flex; align-items: center;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn.active { color: var(--accent); }
    .play-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(91,127,255,.4);
    }
    .play-btn:hover { transform: scale(1.05); }
    .progress-wrap { flex: 1; max-width: 400px; display: flex; align-items: center; gap: 8px; }
    .progress-bar {
      flex: 1; height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }
    .time-label { font-size: 11px; color: var(--text3); width: 36px; text-align: center; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; flex: 0 0 120px; }
    .volume-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; }
    .volume-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 70%; }

    /* ── Track Row ── */
    .track-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background .15s;
      position: relative;
    }
    .track-row:hover { background: var(--surface2); }
    .track-row.playing { background: rgba(91,127,255,.12); }
    .track-num { width: 24px; text-align: center; font-size: 12px; color: var(--text3); flex-shrink: 0; }
    .track-cover { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: var(--surface3); flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: var(--text3); }
    .track-duration { font-size: 12px; color: var(--text3); flex-shrink: 0; }
    .track-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
    .track-row:hover .track-actions { opacity: 1; }
    .track-action-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; }
    .track-action-btn:hover { color: var(--accent); background: var(--surface3); }

    /* ── Upload modal ── */
    .upload-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .upload-drop:hover, .upload-drop.drag { border-color: var(--accent); background: rgba(91,127,255,.05); }
    .upload-drop .drop-icon { font-size: 40px; margin-bottom: 12px; }

    .page-container { padding-bottom: 88px; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px">&#9776;</button>
      <span style="font-weight:700">Music</span>
    </div>

    <div class="page-container wide" style="max-width:900px">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <h1 style="font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">VEtmle Music</h1>
          <p style="color:var(--text3);font-size:13px">Listen to music uploaded by the community</p>
        </div>
        <button class="btn btn-primary" onclick="openUploadModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Upload Track
        </button>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;margin-bottom:16px">
        <button class="btn btn-primary btn-sm" id="tab-all"    onclick="loadTab('all')">All Music</button>
        <button class="btn btn-ghost btn-sm"   id="tab-my"     onclick="loadTab('my')">My Library</button>
        <button class="btn btn-ghost btn-sm"   id="tab-upload" onclick="loadTab('upload')">My Uploads</button>
      </div>

      <!-- Search -->
      <div class="search-bar card" style="margin-bottom:16px;padding:0 16px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="music-search" placeholder="Search tracks, artists..." style="background:transparent;border:none;box-shadow:none;padding:12px 8px" oninput="searchMusic(this.value)">
      </div>

      <!-- Track List -->
      <div class="card" id="track-list" style="padding:8px">
        <div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>
      </div>

    </div>
  </main>
</div>

<!-- Music Player Bar -->
<div class="player-bar hidden" id="player-bar">
  <img id="player-cover" class="player-cover" src="../assets/default-avatar.svg" alt="">
  <div class="player-info">
    <div class="player-title" id="player-title">No track playing</div>
    <div class="player-artist" id="player-artist"></div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()" title="Shuffle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
    </button>
    <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="ctrl-btn play-btn" id="btn-play" onclick="togglePlay()">
      <svg id="icon-play"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="ctrl-btn" onclick="nextTrack()" title="Next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()" title="Repeat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
    </button>
  </div>
  <div class="progress-wrap">
    <span class="time-label" id="time-current">0:00</span>
    <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time-label" id="time-total">0:00</span>
  </div>
  <div class="volume-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
    <div class="volume-bar" id="volume-bar" onclick="setVolume(event)">
      <div class="volume-fill" id="volume-fill"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, createModal } from '../js/app.js';

let currentUser, currentProfile;
let allTracks = [];
let queue = [];
let currentIndex = -1;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let audio = new Audio();
let currentTab = 'all';

// ── Init ──────────────────────────────────────────────────────
async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getCurrentProfile();
  document.getElementById('sidebar').innerHTML = renderSidebar(currentProfile, 'music');
  setupAudio();
  await loadTab('all');
}

// ── Audio setup ───────────────────────────────────────────────
function setupAudio() {
  audio.addEventListener('timeupdate', updateProgress);
  audio.addEventListener('ended', onTrackEnd);
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('time-total').textContent = formatTime(audio.duration);
  });
  audio.volume = 0.7;
  document.getElementById('volume-fill').style.width = '70%';
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateProgress() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatTime(audio.currentTime);
}

function onTrackEnd() {
  if (isRepeat) { audio.currentTime = 0; audio.play(); return; }
  nextTrack();
}

// ── Tabs ──────────────────────────────────────────────────────
window.loadTab = async function(tab) {
  currentTab = tab;
  ['all','my','upload'].forEach(t => {
    document.getElementById('tab-' + t).className = 'btn btn-sm ' + (t === tab ? 'btn-primary' : 'btn-ghost');
  });
  const list = document.getElementById('track-list');
  list.innerHTML = '<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';

  if (tab === 'all') {
    const { data } = await supabase.from('music_tracks')
      .select('*, uploader:profiles!uploader_id(id, full_name, avatar_url)')
      .order('created_at', { ascending: false }).limit(50);
    allTracks = data || [];
  } else if (tab === 'my') {
    const { data } = await supabase.from('user_music')
      .select('track:music_tracks(*,uploader:profiles!uploader_id(id,full_name,avatar_url))')
      .eq('user_id', currentUser.id).order('added_at', { ascending: false });
    allTracks = (data || []).map(d => d.track).filter(Boolean);
  } else {
    const { data } = await supabase.from('music_tracks')
      .select('*, uploader:profiles!uploader_id(id, full_name, avatar_url)')
      .eq('uploader_id', currentUser.id).order('created_at', { ascending: false });
    allTracks = data || [];
  }

  renderTracks(allTracks);
};

// ── Render ────────────────────────────────────────────────────
function renderTracks(tracks) {
  const list = document.getElementById('track-list');
  if (!tracks.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon" style="font-size:48px;margin-bottom:12px">&#127925;</div><h3>No tracks here yet</h3><p style="color:var(--text3)">Upload a track to get started!</p></div>';
    return;
  }
  list.innerHTML = tracks.map((t, i) => trackRow(t, i)).join('');
}

function trackRow(track, idx) {
  const cover = track.cover_url || '../assets/default-avatar.svg';
  const dur   = formatTime(track.duration);
  const isNow = currentIndex >= 0 && queue[currentIndex] && queue[currentIndex].id === track.id;
  return '<div class="track-row' + (isNow ? ' playing' : '') + '" id="tr-' + track.id + '" ondblclick="playTrack(' + idx + ')">' +
    '<span class="track-num">' + (idx + 1) + '</span>' +
    '<img class="track-cover" src="' + cover + '" alt="" onerror="this.src=\'../assets/default-avatar.svg\'">' +
    '<div class="track-info">' +
      '<div class="track-title">' + escHtml(track.title) + '</div>' +
      '<div class="track-artist">' + escHtml(track.artist) + (track.album ? ' — ' + escHtml(track.album) : '') + '</div>' +
    '</div>' +
    '<span style="font-size:11px;color:var(--text3);margin-right:8px">' + (track.plays || 0) + ' plays</span>' +
    '<div class="track-actions">' +
      '<button class="track-action-btn" onclick="event.stopPropagation();addToLibrary(\'' + track.id + '\',this)" title="Save">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>' +
      '</button>' +
      '<button class="track-action-btn" onclick="event.stopPropagation();shareTrack(\'' + track.id + '\')" title="Share">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
      '</button>' +
    '</div>' +
    '<span class="track-duration">' + dur + '</span>' +
  '</div>';
}

function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Playback ──────────────────────────────────────────────────
window.playTrack = async function(idx) {
  queue = [...allTracks];
  currentIndex = idx;
  const track = queue[idx];
  if (!track) return;

  document.getElementById('player-bar').classList.remove('hidden');
  document.getElementById('player-title').textContent = track.title;
  document.getElementById('player-artist').textContent = track.artist;
  document.getElementById('player-cover').src = track.cover_url || '../assets/default-avatar.svg';

  // Resolve audio URL
  let url = track.audio_url;
  if (!url.startsWith('http')) {
    url = supabase.storage.from('music').getPublicUrl(url).data.publicUrl;
  }
  audio.src = url;
  audio.play();
  isPlaying = true;
  updatePlayBtn();

  // Update playing row highlight
  document.querySelectorAll('.track-row.playing').forEach(r => r.classList.remove('playing'));
  const row = document.getElementById('tr-' + track.id);
  if (row) row.classList.add('playing');

  // Increment play count
  await supabase.from('music_tracks').update({ plays: (track.plays || 0) + 1 }).eq('id', track.id);
};

window.togglePlay = function() {
  if (!audio.src) return;
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else           { audio.play();  isPlaying = true;  }
  updatePlayBtn();
};

window.nextTrack = function() {
  if (!queue.length) return;
  let next = isShuffle
    ? Math.floor(Math.random() * queue.length)
    : (currentIndex + 1) % queue.length;
  window.playTrack(next);
};

window.prevTrack = function() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (!queue.length) return;
  const prev = (currentIndex - 1 + queue.length) % queue.length;
  window.playTrack(prev);
};

window.toggleShuffle = function() {
  isShuffle = !isShuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', isShuffle);
};

window.toggleRepeat = function() {
  isRepeat = !isRepeat;
  document.getElementById('btn-repeat').classList.toggle('active', isRepeat);
};

window.seekTo = function(e) {
  const bar = document.getElementById('progress-bar');
  const pct = e.offsetX / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
};

window.setVolume = function(e) {
  const bar = document.getElementById('volume-bar');
  const pct = Math.max(0, Math.min(1, e.offsetX / bar.offsetWidth));
  audio.volume = pct;
  document.getElementById('volume-fill').style.width = (pct * 100) + '%';
};

function updatePlayBtn() {
  document.getElementById('icon-play').style.display  = isPlaying ? 'none'  : 'block';
  document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
}

// ── Library ───────────────────────────────────────────────────
window.addToLibrary = async function(trackId, btn) {
  const { error } = await supabase.from('user_music').insert({ user_id: currentUser.id, track_id: trackId });
  if (error && error.code === '23505') { toast('Already in your library', 'info'); return; }
  if (error) { toast('Error saving track', 'error'); return; }
  btn.style.color = 'var(--accent)';
  toast('Added to your library!', 'success');
};

window.shareTrack = function(trackId) {
  navigator.clipboard.writeText(window.location.origin + '/pages/music.html#' + trackId);
  toast('Link copied!', 'success');
};

// ── Search ────────────────────────────────────────────────────
window.searchMusic = function(q) {
  if (!q.trim()) { renderTracks(allTracks); return; }
  const lq = q.toLowerCase();
  renderTracks(allTracks.filter(t =>
    t.title.toLowerCase().includes(lq) || t.artist.toLowerCase().includes(lq) || (t.album || '').toLowerCase().includes(lq)
  ));
};

// ── Upload ────────────────────────────────────────────────────
window.openUploadModal = function() {
  createModal('Upload Track',
    '<div class="form-group"><label>Title *</label><input id="up-title" placeholder="Track title"></div>' +
    '<div class="form-group"><label>Artist *</label><input id="up-artist" placeholder="Artist name"></div>' +
    '<div class="form-group"><label>Album</label><input id="up-album" placeholder="Album name (optional)"></div>' +
    '<div class="upload-drop" id="audio-drop" onclick="document.getElementById(\'audio-file\').click()">' +
      '<div class="drop-icon">&#127925;</div>' +
      '<p style="font-weight:600;margin-bottom:4px">Click to select audio file</p>' +
      '<p style="font-size:12px;color:var(--text3)">MP3, WAV, OGG up to 50MB</p>' +
      '<p id="audio-filename" style="margin-top:8px;font-size:12px;color:var(--accent)"></p>' +
    '</div>' +
    '<input type="file" id="audio-file" accept="audio/*" style="display:none" onchange="onAudioPick(this)">' +
    '<div class="form-group" style="margin-top:12px"><label>Cover Image (optional)</label>' +
      '<input type="file" id="cover-file" accept="image/*" onchange="onCoverPick(this)">' +
    '</div>',
    '<button class="btn btn-ghost" onclick="document.querySelector(\'.modal-overlay\').remove()">Cancel</button>' +
    '<button class="btn btn-primary" id="upload-btn" onclick="submitUpload()">Upload</button>'
  );
};

window.onAudioPick = function(inp) {
  if (!inp.files[0]) return;
  document.getElementById('audio-filename').textContent = inp.files[0].name;
};
window.onCoverPick = function(inp) {};

window.submitUpload = async function() {
  const title  = document.getElementById('up-title').value.trim();
  const artist = document.getElementById('up-artist').value.trim();
  const album  = document.getElementById('up-album').value.trim();
  const audioFile = document.getElementById('audio-file').files[0];
  const coverFile = document.getElementById('cover-file').files[0];

  if (!title || !artist) { toast('Title and artist are required', 'error'); return; }
  if (!audioFile)         { toast('Please select an audio file', 'error'); return; }

  const btn = document.getElementById('upload-btn');
  btn.disabled = true; btn.textContent = 'Uploading...';

  try {
    // Upload audio
    const audioExt  = audioFile.name.split('.').pop();
    const audioPath = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + audioExt;
    const { error: ae } = await supabase.storage.from('music').upload(audioPath, audioFile);
    if (ae) throw ae;
    const audioUrl = supabase.storage.from('music').getPublicUrl(audioPath).data.publicUrl;

    // Upload cover (optional)
    let coverUrl = null;
    if (coverFile) {
      const coverExt  = coverFile.name.split('.').pop();
      const coverPath = 'covers/' + Date.now() + '.' + coverExt;
      const { error: ce } = await supabase.storage.from('music').upload(coverPath, coverFile);
      if (!ce) coverUrl = supabase.storage.from('music').getPublicUrl(coverPath).data.publicUrl;
    }

    // Get duration via AudioContext
    let duration = null;
    try {
      duration = await new Promise(res => {
        const a = new Audio();
        a.onloadedmetadata = () => res(Math.round(a.duration));
        a.src = URL.createObjectURL(audioFile);
      });
    } catch(e) {}

    const { error: de } = await supabase.from('music_tracks').insert({
      uploader_id: currentUser.id,
      title, artist, album: album || null,
      audio_url: audioUrl,
      cover_url: coverUrl,
      duration,
    });
    if (de) throw de;

    document.querySelector('.modal-overlay')?.remove();
    toast('Track uploaded!', 'success');
    loadTab(currentTab);
  } catch(e) {
    toast('Upload failed: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Upload';
  }
};

window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
