<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VEtmle — Notifications</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content">
        <div class="topbar">
          <button
            onclick="toggleSidebar()"
            style="
              background: none;
              border: none;
              color: var(--text);
              font-size: 22px;
            "
          >
            ☰
          </button>
          <span style="font-weight: 700">Notifications</span>
        </div>

        <div class="page-container single-col">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 16px;
            "
          >
            <div class="page-title" style="margin-bottom: 0">
              🔔 Notifications
            </div>
            <button class="btn btn-ghost btn-sm" onclick="markAllRead()">
              Mark All Read
            </button>
          </div>

          <div class="card" id="notifications-list">
            <div style="display: flex; justify-content: center; padding: 40px">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div id="toast-container"></div>

    <script type="module">
      import {
        supabase,
        requireAuth,
        getCurrentProfile,
        avatarUrl,
        timeAgo,
      } from "../js/supabase.js";
      import { toast, renderSidebar } from "../js/app.js";

      let currentUser = null;

      async function init() {
        currentUser = await requireAuth();
        if (!currentUser) return;
        const profile = await getCurrentProfile();
        document.getElementById("sidebar").innerHTML = renderSidebar(
          profile,
          "notifications",
        );
        await loadNotifications();
      }

      async function loadNotifications() {
        const { data: notifications } = await supabase
          .from("notifications")
          .select("*, actor:profiles!actor_id(id, full_name, avatar_url)")
          .eq("user_id", currentUser.id)
          .order("created_at", { ascending: false })
          .limit(50);

        const list = document.getElementById("notifications-list");

        if (!notifications?.length) {
          list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><h3>No notifications yet</h3><p>You'll see activity here when it happens</p></div>`;
          return;
        }

        // Mark all as read
        await supabase
          .from("notifications")
          .update({ read: true })
          .eq("user_id", currentUser.id)
          .eq("read", false);

        const icons = {
          like: { icon: "❤️", class: "like" },
          comment: { icon: "💬", class: "comment" },
          friend_request: { icon: "👤", class: "friend" },
          friend_accept: { icon: "✅", class: "friend" },
          message: { icon: "✉️", class: "message" },
          wall_post: { icon: "📝", class: "comment" },
        };

        const messages = {
          like: (n) => `<strong>${n.actor?.full_name}</strong> liked your post`,
          comment: (n) =>
            `<strong>${n.actor?.full_name}</strong> commented on your post`,
          friend_request: (n) =>
            `<strong>${n.actor?.full_name}</strong> sent you a friend request`,
          friend_accept: (n) =>
            `<strong>${n.actor?.full_name}</strong> accepted your friend request`,
          message: (n) =>
            `<strong>${n.actor?.full_name}</strong> sent you a message`,
          wall_post: (n) =>
            `<strong>${n.actor?.full_name}</strong> wrote on your wall`,
        };

        const actions = {
          like: (n) =>
            n.entity_id ? `../pages/post.html?id=${n.entity_id}` : "#",
          comment: (n) =>
            n.entity_id ? `../pages/post.html?id=${n.entity_id}` : "#",
          friend_request: (n) => `../pages/friends.html`,
          friend_accept: (n) => `../pages/profile.html?id=${n.actor_id}`,
          message: (n) => `../pages/messages.html?user=${n.actor_id}`,
          wall_post: (n) => `../pages/profile.html?id=${currentUser.id}`,
        };

        list.innerHTML = notifications
          .map((n) => {
            const conf = icons[n.type] || { icon: "🔔", class: "comment" };
            const msg = messages[n.type]?.(n) || "New notification";
            const href = actions[n.type]?.(n) || "#";

            return `
      <div class="notification-item${n.read ? "" : " unread"}" onclick="window.location.href='${href}'">
        <img class="avatar avatar-sm" src="${avatarUrl(n.actor?.avatar_url)}" alt="" style="cursor:pointer"
             onclick="event.stopPropagation();window.location.href='../pages/profile.html?id=${n.actor_id}'">
        <div class="notification-icon ${conf.class}">${conf.icon}</div>
        <div class="notification-text">
          ${msg}
          <div class="notification-time">${timeAgo(n.created_at)}</div>
        </div>
        ${!n.read ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px"></div>' : ""}
      </div>
    `;
          })
          .join("");
      }

      window.markAllRead = async function () {
        await supabase
          .from("notifications")
          .update({ read: true })
          .eq("user_id", currentUser.id);
        document
          .querySelectorAll(".notification-item.unread")
          .forEach((el) => el.classList.remove("unread"));
        document
          .querySelectorAll(
            '.notification-item [style*="background:var(--accent)"]',
          )
          .forEach((el) => el.remove());
        toast("All notifications marked as read", "success");
      };

      window.toggleSidebar = function () {
        document.getElementById("sidebar").classList.toggle("open");
      };

      init();
    </script>
  </body>
</html>
