<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Notifications</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
      <span style="font-weight:500">Notifications</span>
    </div>
    <div class="page-narrow">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h1 style="font-size:17px;font-weight:500">Notifications</h1>
        <button class="btn btn-secondary btn-sm" onclick="markAllRead()">Mark all read</button>
      </div>
      <div class="card" id="notif-list">
        <div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader } from '../js/app.js';

let user, profile;
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'notifications');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'notifications');
  loadNotifs();
}

async function loadNotifs() {
  const {data} = await supabase.from('notifications')
    .select('*, actor:profiles!actor_id(id,full_name,avatar_url)')
    .eq('user_id', user.id)
    .order('created_at', {ascending:false})
    .limit(50);

  const list = document.getElementById('notif-list');
  if (!(data||[]).length) {
    list.innerHTML = '<div class="empty-state"><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
    return;
  }

  const icons = {like:'❤️', comment:'💬', friend_request:'👤', friend_accept:'✅', repost:'🔄', mention:'@', group_invite:'👥'};

  list.innerHTML = data.map(n => {
    const avt = avatarUrl(n.actor?.avatar_url);
    const ico = icons[n.type] || '🔔';
    return '<div class="notif-item'+(n.read?'':' unread')+'" onclick="openNotif(\''+n.id+'\',\''+n.type+'\',\''+n.reference_id+'\')">'
      + '<div style="position:relative;flex-shrink:0">'
      + '<img src="'+avt+'" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.src=\'../assets/default-avatar.svg\'">'
      + '<span style="position:absolute;bottom:-2px;right:-2px;font-size:14px">'+ico+'</span>'
      + '</div>'
      + '<div class="notif-text">'
      + '<b>'+esc(n.actor?.full_name||'Someone')+'</b> '+esc(n.message||typeLabel(n.type))
      + '<div class="notif-meta">'+timeAgo(n.created_at)+'</div>'
      + '</div>'
      + (!n.read ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0"></div>' : '')
      + '</div>';
  }).join('');
}

function typeLabel(t){
  const m={like:'liked your post',comment:'commented on your post',friend_request:'sent you a friend request',friend_accept:'accepted your friend request',repost:'reposted your post'};
  return m[t]||'interacted with you';
}

window.openNotif = async function(id, type, refId) {
  await supabase.from('notifications').update({read:true}).eq('id',id);
  document.querySelector('[onclick*="\''+id+'\'"]')?.classList.remove('unread');
  // Navigate based on type
  if (type==='like'||type==='comment'||type==='repost') location.href='../pages/feed.html';
  else if (type==='friend_request'||type==='friend_accept') location.href='../pages/friends.html';
};

window.markAllRead = async function() {
  await supabase.from('notifications').update({read:true}).eq('user_id',user.id);
  document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread'));
  document.querySelectorAll('.notif-item [style*="background:var(--blue)"]').forEach(el=>el.remove());
  toast('All notifications marked as read','success');
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
