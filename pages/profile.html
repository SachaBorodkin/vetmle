<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px">☰</button>
      <span id="topbar-name" style="font-weight:700"></span>
    </div>

    <div class="page-container wide" style="max-width:860px">
      <div id="profile-container">
        <div style="display:flex;justify-content:center;padding:60px">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, coverUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderPost, createModal, formatCount } from '../js/app.js';

const params = new URLSearchParams(location.search);
const profileId = params.get('id');

let currentUser = null;
let currentProfile = null;
let viewedProfile = null;
let friendshipStatus = null;
let activeTab = 'wall';

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getCurrentProfile();

  document.getElementById('sidebar').innerHTML = renderSidebar(currentProfile, 'profile');

  const id = profileId || currentUser.id;
  await loadProfile(id);
}

async function loadProfile(id) {
  const { data: profile } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', id)
    .single();

  if (!profile) {
    document.getElementById('profile-container').innerHTML = `
      <div class="empty-state"><div class="empty-icon">😕</div><h3>Profile not found</h3></div>
    `;
    return;
  }

  viewedProfile = profile;
  document.title = `VEtmle — ${profile.full_name}`;
  document.getElementById('topbar-name').textContent = profile.full_name;

  // Get counts
  const [friendsRes, postsRes] = await Promise.all([
    supabase.from('friendships').select('id', { count: 'exact' })
      .or(`requester_id.eq.${id},addressee_id.eq.${id}`).eq('status', 'accepted'),
    supabase.from('posts').select('id', { count: 'exact' }).eq('author_id', id)
  ]);

  const friendsCount = friendsRes.count || 0;
  const postsCount = postsRes.count || 0;

  // Check friendship
  if (id !== currentUser.id) {
    const { data: fs } = await supabase
      .from('friendships')
      .select('*')
      .or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${id}),and(requester_id.eq.${id},addressee_id.eq.${currentUser.id})`)
      .single();
    friendshipStatus = fs;
  }

  const isOwnProfile = id === currentUser.id;
  const isFriend = friendshipStatus?.status === 'accepted';
  const isPending = friendshipStatus?.status === 'pending';
  const isRequester = friendshipStatus?.requester_id === currentUser.id;

  let actionButtons = '';
  if (isOwnProfile) {
    actionButtons = `
      <button class="btn btn-ghost" onclick="openEditProfile()">✏️ Edit Profile</button>
      <button class="btn btn-ghost" onclick="openAvatarUpload()">🖼️ Change Photo</button>
    `;
  } else {
    if (isFriend) {
      actionButtons = `
        <button class="btn btn-primary" onclick="openMessage('${id}')">✉️ Message</button>
        <button class="btn btn-ghost" onclick="removeFriend('${friendshipStatus.id}')">👤 Friends</button>
      `;
    } else if (isPending && isRequester) {
      actionButtons = `
        <button class="btn btn-ghost" onclick="cancelRequest('${friendshipStatus.id}')">⏳ Request Sent</button>
      `;
    } else if (isPending && !isRequester) {
      actionButtons = `
        <button class="btn btn-green" onclick="acceptRequest('${friendshipStatus.id}')">✅ Accept Request</button>
        <button class="btn btn-ghost" onclick="declineRequest('${friendshipStatus.id}')">❌ Decline</button>
      `;
    } else {
      actionButtons = `
        <button class="btn btn-primary" onclick="sendFriendRequest('${id}')">➕ Add Friend</button>
        <button class="btn btn-ghost" onclick="openMessage('${id}')">✉️ Message</button>
      `;
    }
  }

  const coverBg = coverUrl(profile.cover_url)
    ? `background-image:url('${coverUrl(profile.cover_url)}');background-size:cover;background-position:center`
    : 'background:linear-gradient(135deg,#1a2040,#0e1428)';

  document.getElementById('profile-container').innerHTML = `
    <div class="profile-header-card">
      <div class="profile-cover-wrap">
        <div class="cover-img-inner" style="${coverBg}"></div>
        ${isOwnProfile ? `<button onclick="openCoverUpload()" class="btn btn-ghost btn-sm" style="position:absolute;bottom:12px;right:12px;z-index:5">🖼️ Edit Cover</button>` : ''}
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-border">
            <img src="${avatarUrl(profile.avatar_url)}" alt="" id="profile-main-avatar">
          </div>
        </div>
      </div>

      <div class="profile-header-info">
        <div>
          <div class="profile-name">${profile.full_name}</div>
          <div class="profile-username">@${profile.username}</div>
          ${profile.bio ? `<div class="profile-bio">${profile.bio}</div>` : ''}
          <div class="profile-stats">
            <div class="profile-stat" onclick="showTab('friends')">
              <div class="num">${friendsCount}</div>
              <div class="label">Friends</div>
            </div>
            <div class="profile-stat">
              <div class="num">${postsCount}</div>
              <div class="label">Posts</div>
            </div>
            ${profile.city ? `<div class="profile-stat"><div class="num" style="font-size:13px">📍</div><div class="label">${profile.city}</div></div>` : ''}
          </div>
        </div>
        <div class="profile-actions">
          ${actionButtons}
        </div>
      </div>

      <div class="profile-tabs" id="profile-tabs">
        <a class="profile-tab active" data-tab="wall" onclick="showTab('wall')">Wall</a>
        <a class="profile-tab" data-tab="friends" onclick="showTab('friends')">Friends</a>
        <a class="profile-tab" data-tab="photos" onclick="showTab('photos')">Photos</a>
        <a class="profile-tab" data-tab="info" onclick="showTab('info')">Info</a>
      </div>
    </div>

    <div id="tab-content"></div>
  `;

  showTab('wall');
}

window.showTab = async function(tab) {
  activeTab = tab;
  document.querySelectorAll('.profile-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  const content = document.getElementById('tab-content');
  content.innerHTML = '<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';

  const id = profileId || currentUser.id;

  if (tab === 'wall') await loadWall(id, content);
  else if (tab === 'friends') await loadFriends(id, content);
  else if (tab === 'photos') await loadPhotos(id, content);
  else if (tab === 'info') loadInfo(content);
};

async function loadWall(id, content) {
  const isOwnProfile = id === currentUser.id;

  let wallHTML = '';

  // Wall post compose (for own profile or friends)
  const canPost = isOwnProfile || friendshipStatus?.status === 'accepted';
  if (canPost) {
    wallHTML += `
      <div class="post-compose card" style="margin-bottom:14px">
        <div class="compose-row">
          <img class="avatar avatar-md" src="${avatarUrl(currentProfile?.avatar_url)}" alt="">
          <textarea class="compose-input" id="wall-compose" placeholder="Write on ${isOwnProfile ? 'your' : viewedProfile.full_name + "'s"} wall..." rows="2"></textarea>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary btn-sm" onclick="submitWallPost('${id}')">Post</button>
        </div>
      </div>
    `;
  }

  const { data: posts } = await supabase
    .from('posts')
    .select('*, author:profiles!author_id(id, full_name, username, avatar_url), wall_owner:profiles!wall_owner_id(id, full_name)')
    .eq('wall_owner_id', id)
    .order('created_at', { ascending: false })
    .limit(20);

  // Get likes
  if (posts?.length) {
    const { data: userLikes } = await supabase
      .from('likes').select('post_id').eq('user_id', currentUser.id)
      .in('post_id', posts.map(p => p.id));
    const likedSet = new Set((userLikes || []).map(l => l.post_id));
    posts.forEach(p => p.user_liked = likedSet.has(p.id));
  }

  wallHTML += (posts || []).map(p => renderPost(p, currentUser.id)).join('');
  if (!posts?.length) {
    wallHTML += '<div class="empty-state"><div class="empty-icon">📝</div><h3>No posts yet</h3></div>';
  }

  content.innerHTML = wallHTML;
}

async function loadFriends(id, content) {
  const { data: friendships } = await supabase
    .from('friendships')
    .select('requester_id, addressee_id, requester:profiles!requester_id(id, full_name, avatar_url), addressee:profiles!addressee_id(id, full_name, avatar_url)')
    .or(`requester_id.eq.${id},addressee_id.eq.${id}`)
    .eq('status', 'accepted');

  const friends = (friendships || []).map(f =>
    f.requester_id === id ? f.addressee : f.requester
  ).filter(Boolean);

  content.innerHTML = `
    <div class="card" style="padding:16px">
      <div class="panel-title">Friends (${friends.length})</div>
      ${friends.length ? `
        <div class="friends-grid">
          ${friends.map(f => `
            <div class="friend-card" onclick="window.location.href='../pages/profile.html?id=${f.id}'">
              <img class="avatar avatar-lg" src="${avatarUrl(f.avatar_url)}" alt="">
              <div class="name">${f.full_name}</div>
            </div>
          `).join('')}
        </div>
      ` : '<div class="empty-state"><div class="empty-icon">👥</div><h3>No friends yet</h3></div>'}
    </div>
  `;
}

async function loadPhotos(id, content) {
  const { data: posts } = await supabase
    .from('posts')
    .select('id, image_url')
    .eq('author_id', id)
    .not('image_url', 'is', null)
    .order('created_at', { ascending: false })
    .limit(30);

  content.innerHTML = `
    <div class="card" style="padding:16px">
      <div class="panel-title">Photos (${posts?.length || 0})</div>
      ${posts?.length ? `
        <div class="photo-grid">
          ${posts.map(p => `<img src="${p.image_url}" alt="" onclick="openImageViewer('${p.image_url}')">`).join('')}
        </div>
      ` : '<div class="empty-state"><div class="empty-icon">🖼️</div><h3>No photos yet</h3></div>'}
    </div>
  `;
}

function loadInfo(content) {
  const p = viewedProfile;
  content.innerHTML = `
    <div class="card" style="padding:24px">
      <div class="panel-title">Personal Info</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${p.full_name ? `<div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">👤</span><div><div style="font-size:12px;color:var(--text3)">Name</div><div style="font-weight:600">${p.full_name}</div></div></div>` : ''}
        ${p.username ? `<div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">🔗</span><div><div style="font-size:12px;color:var(--text3)">Username</div><div style="font-weight:600">@${p.username}</div></div></div>` : ''}
        ${p.city ? `<div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">📍</span><div><div style="font-size:12px;color:var(--text3)">City</div><div style="font-weight:600">${p.city}</div></div></div>` : ''}
        ${p.birthday ? `<div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">🎂</span><div><div style="font-size:12px;color:var(--text3)">Birthday</div><div style="font-weight:600">${new Date(p.birthday).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div></div>` : ''}
        ${p.bio ? `<div style="display:flex;gap:10px;align-items:flex-start"><span style="font-size:18px">💬</span><div><div style="font-size:12px;color:var(--text3)">About</div><div>${p.bio}</div></div></div>` : ''}
        <div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">📅</span><div><div style="font-size:12px;color:var(--text3)">Joined</div><div style="font-weight:600">${new Date(p.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'})}</div></div></div>
      </div>
    </div>
  `;
}

// ── Friend actions ──
window.sendFriendRequest = async function(id) {
  const { error } = await supabase.from('friendships').insert({
    requester_id: currentUser.id,
    addressee_id: id,
    status: 'pending'
  });
  if (error) { toast('Failed to send request', 'error'); return; }
  await supabase.from('notifications').insert({
    user_id: id,
    actor_id: currentUser.id,
    type: 'friend_request'
  });
  toast('Friend request sent!', 'success');
  loadProfile(id);
};

window.cancelRequest = async function(id) {
  await supabase.from('friendships').delete().eq('id', id);
  toast('Request cancelled', 'info');
  loadProfile(profileId || currentUser.id);
};

window.acceptRequest = async function(id) {
  await supabase.from('friendships').update({ status: 'accepted' }).eq('id', id);
  await supabase.from('notifications').insert({
    user_id: friendshipStatus.requester_id,
    actor_id: currentUser.id,
    type: 'friend_accept'
  });
  toast('Friend request accepted!', 'success');
  loadProfile(profileId || currentUser.id);
};

window.declineRequest = async function(id) {
  await supabase.from('friendships').delete().eq('id', id);
  toast('Request declined', 'info');
  loadProfile(profileId || currentUser.id);
};

window.removeFriend = async function(id) {
  if (!confirm('Remove this friend?')) return;
  await supabase.from('friendships').delete().eq('id', id);
  toast('Removed from friends', 'info');
  loadProfile(profileId || currentUser.id);
};

window.openMessage = function(id) {
  window.location.href = `../pages/messages.html?user=${id}`;
};

window.submitWallPost = async function(wallOwnerId) {
  const content = document.getElementById('wall-compose').value.trim();
  if (!content) return;
  const { data: post, error } = await supabase.from('posts').insert({
    author_id: currentUser.id,
    wall_owner_id: wallOwnerId,
    content,
  }).select('*, author:profiles!author_id(id, full_name, username, avatar_url), wall_owner:profiles!wall_owner_id(id, full_name)').single();
  if (error) { toast('Failed to post', 'error'); return; }
  if (wallOwnerId !== currentUser.id) {
    await supabase.from('notifications').insert({
      user_id: wallOwnerId,
      actor_id: currentUser.id,
      type: 'wall_post',
      entity_id: post.id
    });
  }
  post.user_liked = false;
  const wallCompose = document.querySelector('.post-compose.card');
  wallCompose.insertAdjacentHTML('afterend', renderPost(post, currentUser.id));
  document.getElementById('wall-compose').value = '';
  toast('Posted!', 'success');
};

// ── Edit Profile ──
window.openEditProfile = function() {
  const p = viewedProfile;
  const overlay = createModal('Edit Profile', `
    <div class="form-group"><label>Full Name</label><input id="edit-name" value="${p.full_name || ''}"></div>
    <div class="form-group"><label>Username</label><input id="edit-username" value="${p.username || ''}"></div>
    <div class="form-group"><label>Bio</label><textarea id="edit-bio">${p.bio || ''}</textarea></div>
    <div class="form-group"><label>City</label><input id="edit-city" value="${p.city || ''}"></div>
    <div class="form-group"><label>Birthday</label><input type="date" id="edit-birthday" value="${p.birthday || ''}"></div>
  `, `
    <button class="btn btn-ghost" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
    <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
  `);
};

window.saveProfile = async function() {
  const updates = {
    full_name: document.getElementById('edit-name').value.trim(),
    username: document.getElementById('edit-username').value.trim().toLowerCase(),
    bio: document.getElementById('edit-bio').value.trim(),
    city: document.getElementById('edit-city').value.trim(),
    birthday: document.getElementById('edit-birthday').value || null,
  };
  const { error } = await supabase.from('profiles').update(updates).eq('id', currentUser.id);
  if (error) { toast('Failed to save: ' + error.message, 'error'); return; }
  document.querySelector('.modal-overlay')?.remove();
  toast('Profile updated!', 'success');
  loadProfile(currentUser.id);
};

window.openAvatarUpload = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    toast('Uploading...', 'info');
    try {
      const { uploadImage } = await import('../js/app.js');
      const path = await uploadImage(supabase, 'avatars', file);
      await supabase.from('profiles').update({ avatar_url: path }).eq('id', currentUser.id);
      toast('Avatar updated!', 'success');
      loadProfile(currentUser.id);
    } catch (e) {
      toast('Upload failed', 'error');
    }
  };
  input.click();
};

window.openCoverUpload = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    toast('Uploading...', 'info');
    try {
      const { uploadImage } = await import('../js/app.js');
      const path = await uploadImage(supabase, 'covers', file);
      await supabase.from('profiles').update({ cover_url: path }).eq('id', currentUser.id);
      toast('Cover updated!', 'success');
      loadProfile(currentUser.id);
    } catch (e) {
      toast('Upload failed', 'error');
    }
  };
  input.click();
};

window.openImageViewer = function(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
};

window.handleLike = async function(btn, postId) {
  const isLiked = btn.classList.contains('liked');
  const countEl = btn.querySelector('.count');
  if (isLiked) {
    btn.classList.remove('liked');
    btn.innerHTML = `🤍 <span class="count">${Math.max(0, parseInt(countEl.textContent) - 1)}</span>`;
    await supabase.from('likes').delete().match({ user_id: currentUser.id, post_id: postId });
  } else {
    btn.classList.add('liked');
    btn.innerHTML = `❤️ <span class="count">${parseInt(countEl.textContent) + 1}</span>`;
    await supabase.from('likes').insert({ user_id: currentUser.id, post_id: postId });
  }
};

window.toggleComments = async function(btn, postId) {
  const container = document.getElementById(`comments-${postId}`);
  if (container.style.display !== 'none') { container.style.display = 'none'; return; }
  container.style.display = 'block';
  container.innerHTML = '<div class="comments-section"><div style="color:var(--text3);font-size:13px">Loading...</div></div>';
  const { data: comments } = await supabase.from('comments')
    .select('*, author:profiles!author_id(id, full_name, avatar_url)')
    .eq('post_id', postId).order('created_at', { ascending: true });
  container.innerHTML = `
    <div class="comments-section">
      ${(comments || []).map(c => `
        <div class="comment">
          <img class="avatar avatar-sm" src="${avatarUrl(c.author?.avatar_url)}" alt="">
          <div class="comment-body">
            <div class="comment-author"><a href="../pages/profile.html?id=${c.author_id}">${c.author?.full_name || 'User'}</a></div>
            <div class="comment-text">${c.content}</div>
            <div class="comment-meta">${timeAgo(c.created_at)}</div>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text3);font-size:13px;padding:8px 0">No comments yet</p>'}
      <div class="comment-input-row">
        <img class="avatar avatar-sm" src="${avatarUrl(currentProfile?.avatar_url)}" alt="">
        <input type="text" id="comment-input-${postId}" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')submitComment('${postId}')">
        <button class="btn btn-primary btn-sm" onclick="submitComment('${postId}')">Send</button>
      </div>
    </div>
  `;
};

window.submitComment = async function(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;
  const { data: comment } = await supabase.from('comments').insert({
    post_id: postId, author_id: currentUser.id, content,
  }).select('*, author:profiles!author_id(id, full_name, avatar_url)').single();
  input.value = '';
  const section = document.querySelector(`#comments-${postId} .comments-section`);
  const inputRow = section.querySelector('.comment-input-row');
  const el = document.createElement('div');
  el.className = 'comment';
  el.innerHTML = `
    <img class="avatar avatar-sm" src="${avatarUrl(comment.author?.avatar_url)}" alt="">
    <div class="comment-body">
      <div class="comment-author"><a href="../pages/profile.html?id=${comment.author_id}">${comment.author?.full_name}</a></div>
      <div class="comment-text">${comment.content}</div>
      <div class="comment-meta">just now</div>
    </div>
  `;
  section.insertBefore(el, inputRow);
};

window.togglePostMenu = function(btn, postId) {
  const menu = document.createElement('div');
  menu.className = 'dropdown-menu';
  [{ icon: '🗑️', label: 'Delete post', danger: true, action: async () => {
    if (!confirm('Delete?')) return;
    await supabase.from('posts').delete().eq('id', postId);
    document.querySelector(`[data-post-id="${postId}"]`)?.remove();
    toast('Deleted', 'success');
  }}].forEach(item => {
    const el = document.createElement('button');
    el.className = `dropdown-item${item.danger ? ' danger' : ''}`;
    el.innerHTML = `${item.icon} ${item.label}`;
    el.onclick = () => { item.action(); menu.remove(); };
    menu.appendChild(el);
  });
  btn.parentElement.style.position = 'relative';
  btn.parentElement.appendChild(menu);
  setTimeout(() => document.addEventListener('click', function c(e) {
    if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', c); }
  }), 10);
};

window.sharePost = function(postId) {
  navigator.clipboard.writeText(`${origin}../pages/post.html?id=${postId}`);
  toast('Link copied!', 'success');
};

window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('open');
};

init();
</script>
</body>
</html>
