<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
    </div>

    <div class="page" style="max-width:900px">

      <!-- Profile header card -->
      <div class="prof-card" id="profile-header">
        <div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>
      </div>

      <!-- Profile tabs bar -->
      <div id="profile-tabs-bar" style="display:none" class="prof-card" style="margin-bottom:12px">
        <div class="prof-tabs">
          <button class="profile-tab active" onclick="showTab('posts',this)">Wall</button>
          <button class="profile-tab"        onclick="showTab('photos',this)">Photos</button>
          <button class="profile-tab"        onclick="showTab('friends',this)">Friends</button>
          <button class="profile-tab"        onclick="showTab('info',this)">Info</button>
        </div>
      </div>

      <!-- Tab content -->
      <div id="tab-posts">
        <div id="wall-compose" style="display:none" class="post-compose">
          <div class="compose-row">
            <img id="wall-avatar" src="../assets/default-avatar.svg"
              style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0"
              onerror="this.src='../assets/default-avatar.svg'">
            <textarea class="compose-input" id="wall-text"
              placeholder="Write on your wall…"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px'"
              onfocus="document.getElementById('wall-footer').style.display='flex'"></textarea>
          </div>
          <div id="wall-footer" style="display:none" class="compose-footer">
            <div></div>
            <button class="btn btn-primary btn-sm" onclick="postOnWall()">Post</button>
          </div>
        </div>
        <div id="wall-feed"></div>
      </div>

      <div id="tab-photos" style="display:none">
        <div class="prof-card" style="padding:12px">
          <div id="photos-grid" class="photos-grid"></div>
        </div>
      </div>

      <div id="tab-friends" style="display:none">
        <div class="prof-card" style="padding:12px">
          <div id="friends-grid" class="friends-grid"></div>
        </div>
      </div>

      <div id="tab-info" style="display:none">
        <div class="prof-card" id="info-section"></div>
      </div>

    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader, renderPost, createModal } from '../js/app.js';
import { initMiniPlayer } from '../js/player.js';

let user, myProfile, viewProfile;
const pid = new URLSearchParams(location.search).get('id');
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user      = await requireAuth(); if (!user) return;
  myProfile = await getCurrentProfile();
  renderHeader(myProfile, 'profile');
  document.getElementById('sidebar').innerHTML = renderSidebar(myProfile, 'profile');
  initMiniPlayer();

  const targetId = pid || user.id;
  const {data:p} = await supabase.from('profiles').select('*').eq('id',targetId).single();
  viewProfile = p;
  if (!p) {
    document.getElementById('profile-header').innerHTML = '<div class="empty-state"><h3>User not found</h3></div>';
    return;
  }

  renderProfileHeader(p);
  document.getElementById('profile-tabs-bar').style.display = 'block';

  if (targetId === user.id) {
    document.getElementById('wall-compose').style.display = 'block';
    document.getElementById('wall-avatar').src = avatarUrl(myProfile?.avatar_url);
  }
  loadWall();
}

// ── Profile header ─────────────────────────────────────────────
function renderProfileHeader(p) {
  const isMe = p.id === user.id;
  const avt  = avatarUrl(p.avatar_url);
  const cov  = p.cover_url || '';

  let actionBtns = isMe
    ? `<button class="btn btn-secondary btn-sm" onclick="openEditProfile()">Edit Profile</button>`
    : `<button class="btn btn-primary btn-sm" id="friend-btn" onclick="friendAction('${p.id}')">Add Friend</button>
       <button class="btn btn-secondary btn-sm" onclick="location.href='../pages/messages.html?user=${p.id}'">Message</button>`;

  document.getElementById('profile-header').innerHTML = `
    <div class="prof-cover">
      ${cov ? `<img src="${cov}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="prof-avatar-wrap">
        <img class="prof-avatar" src="${avt}" alt=""
          onerror="this.src='../assets/default-avatar.svg'">
      </div>
    </div>
    <div class="prof-info">
      <div>
        <div class="prof-name">${esc(p.full_name||'User')}</div>
        ${p.username ? `<div class="prof-username">@${esc(p.username)}</div>` : ''}
        ${p.bio      ? `<div class="prof-bio">${esc(p.bio)}</div>` : ''}
        <div class="prof-stats">
          <div class="prof-stat">
            <div class="prof-stat-n" id="stat-posts">—</div>
            <div class="prof-stat-l">Posts</div>
          </div>
          <div class="prof-stat" onclick="showTab('friends',document.querySelectorAll('.profile-tab')[2])">
            <div class="prof-stat-n" id="stat-friends">—</div>
            <div class="prof-stat-l">Friends</div>
          </div>
        </div>
      </div>
      <div class="prof-actions">${actionBtns}</div>
    </div>`;

  // Load post + friend counts
  Promise.all([
    supabase.from('posts').select('id',{count:'exact',head:true}).eq('author_id',p.id),
    supabase.from('friendships').select('id',{count:'exact',head:true})
      .or('requester_id.eq.'+p.id+',addressee_id.eq.'+p.id).eq('status','accepted'),
  ]).then(([posts,friends]) => {
    const sp = document.getElementById('stat-posts');
    const sf = document.getElementById('stat-friends');
    if (sp) sp.textContent = posts.count  ?? 0;
    if (sf) sf.textContent = friends.count ?? 0;
  });

  if (!isMe) checkFriendStatus(p.id);
}

async function checkFriendStatus(targetId) {
  const {data} = await supabase.from('friendships')
    .select('id,status,requester_id')
    .or(`and(requester_id.eq.${user.id},addressee_id.eq.${targetId}),and(requester_id.eq.${targetId},addressee_id.eq.${user.id})`)
    .maybeSingle();
  const btn = document.getElementById('friend-btn'); if (!btn) return;
  if (!data)                                              { btn.textContent='Add Friend';      btn.className='btn btn-primary btn-sm'; }
  else if (data.status==='accepted')                      { btn.textContent='✓ Friends';       btn.className='btn btn-secondary btn-sm'; }
  else if (data.status==='pending'&&data.requester_id===user.id) { btn.textContent='Pending…'; btn.className='btn btn-secondary btn-sm'; }
  else                                                    { btn.textContent='Accept Request';  btn.className='btn btn-primary btn-sm'; }
}

window.friendAction = async function(targetId) {
  const {data} = await supabase.from('friendships')
    .select('id,status,requester_id')
    .or(`and(requester_id.eq.${user.id},addressee_id.eq.${targetId}),and(requester_id.eq.${targetId},addressee_id.eq.${user.id})`)
    .maybeSingle();
  if (!data) {
    await supabase.from('friendships').insert({requester_id:user.id,addressee_id:targetId,status:'pending'});
    toast('Friend request sent!','success');
  } else if (data.status==='pending' && data.requester_id!==user.id) {
    await supabase.from('friendships').update({status:'accepted'}).eq('id',data.id);
    toast('Friend added!','success');
  } else if (data.status==='accepted') {
    if (!confirm('Remove friend?')) return;
    await supabase.from('friendships').delete().eq('id',data.id);
    toast('Removed friend','info');
  }
  checkFriendStatus(targetId);
};

// ── Wall ───────────────────────────────────────────────────────
async function loadWall() {
  const targetId = pid || user.id;
  const {data:posts} = await supabase.from('posts')
    .select('*, author:profiles!author_id(id,full_name,username,avatar_url)')
    .eq('wall_owner_id',targetId).order('created_at',{ascending:false}).limit(20);

  if (posts?.length) {
    const {data:lks} = await supabase.from('likes').select('post_id').eq('user_id',user.id).in('post_id',posts.map(p=>p.id));
    const liked = new Set((lks||[]).map(l=>l.post_id));
    posts.forEach(p=>p.user_liked=liked.has(p.id));
  }

  const feed = document.getElementById('wall-feed');
  if (!posts?.length) { feed.innerHTML='<div class="empty-state"><h3>No posts yet</h3></div>'; return; }
  feed.innerHTML = posts.map(p=>renderPost(p,user.id)).join('');
}

window.postOnWall = async function() {
  const txt = document.getElementById('wall-text').value.trim();
  if (!txt) return;
  const targetId = pid||user.id;
  const {data:post,error} = await supabase.from('posts').insert({
    author_id:user.id, wall_owner_id:targetId, content:txt,
  }).select('*, author:profiles!author_id(id,full_name,username,avatar_url)').single();
  if (error) { toast('Post failed','error'); return; }
  document.getElementById('wall-text').value = '';
  document.getElementById('wall-footer').style.display='none';
  post.user_liked=false;
  document.getElementById('wall-feed').insertAdjacentHTML('afterbegin',renderPost(post,user.id));
  toast('Posted!','success');
};

// ── Tabs ───────────────────────────────────────────────────────
window.showTab = function(tab, btn) {
  ['posts','photos','friends','info'].forEach(t =>
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none'
  );
  document.querySelectorAll('.profile-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (tab==='photos')  loadPhotos();
  if (tab==='friends') loadFriends();
  if (tab==='info')    loadInfo();
};

async function loadPhotos() {
  const targetId = pid||user.id;
  const {data:posts} = await supabase.from('posts')
    .select('id,image_url').eq('author_id',targetId)
    .not('image_url','is',null).order('created_at',{ascending:false}).limit(60);
  const grid = document.getElementById('photos-grid');
  if (!posts?.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><h3>No photos yet</h3></div>'; return; }
  grid.innerHTML = posts.map(p=>
    `<img src="${p.image_url}" loading="lazy"
       style="width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in;border-radius:3px"
       onclick="openImageViewer('${p.image_url}')"
       onerror="this.style.display='none'">`
  ).join('');
}

async function loadFriends() {
  const targetId = pid||user.id;
  const {data:fs} = await supabase.from('friendships')
    .select('requester_id,addressee_id')
    .or('requester_id.eq.'+targetId+',addressee_id.eq.'+targetId)
    .eq('status','accepted');
  const ids = (fs||[]).map(f=>f.requester_id===targetId ? f.addressee_id : f.requester_id);
  const grid = document.getElementById('friends-grid');
  if (!ids.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><h3>No friends yet</h3></div>'; return; }
  const {data:pp} = await supabase.from('profiles').select('id,full_name,avatar_url').in('id',ids).limit(50);
  grid.innerHTML = (pp||[]).map(p=>`
    <div class="friend-card" onclick="location.href='../pages/profile.html?id=${p.id}'">
      <img src="${avatarUrl(p.avatar_url)}" alt="" onerror="this.src='../assets/default-avatar.svg'">
      <div class="friend-card-name">${esc(p.full_name)}</div>
    </div>`).join('');
}

function loadInfo() {
  const p = viewProfile;
  const rows = [
    p.bio       && ['Bio',      esc(p.bio)],
    p.city      && ['City',     esc(p.city)],
    p.website   && ['Website',  `<a href="${p.website}" target="_blank" rel="noopener">${esc(p.website)}</a>`],
    p.birthdate && ['Birthday', new Date(p.birthdate).toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'})],
  ].filter(Boolean);
  const sec = document.getElementById('info-section');
  if (!rows.length) { sec.innerHTML='<div class="empty-state"><h3>No info added</h3></div>'; return; }
  sec.innerHTML = rows.map(([k,v])=>`
    <div class="settings-row">
      <div class="settings-row-label"><span>${k}</span></div>
      <div style="font-size:13.5px">${v}</div>
    </div>`).join('');
}

// ── Edit profile ───────────────────────────────────────────────
window.openEditProfile = function() {
  const p = myProfile;
  createModal('Edit Profile',
    `<div class="form-group"><label>Full Name</label><input id="ep-name" value="${esc(p.full_name||'')}"></div>
     <div class="form-group"><label>Bio</label><textarea id="ep-bio" rows="3">${esc(p.bio||'')}</textarea></div>
     <div class="form-group"><label>City</label><input id="ep-city" value="${esc(p.city||'')}"></div>
     <div class="form-group"><label>Website</label><input id="ep-site" value="${esc(p.website||'')}"></div>
     <div class="form-group"><label>Avatar photo</label><input type="file" id="ep-avt" accept="image/*"></div>
     <div class="form-group"><label>Cover photo</label><input type="file" id="ep-cov" accept="image/*"></div>`,
    `<button class="btn btn-secondary btn-sm" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="ep-save" onclick="saveProfile()">Save</button>`
  );
};

window.saveProfile = async function() {
  const btn = document.getElementById('ep-save');
  btn.disabled=true; btn.textContent='Saving…';
  const updates = {
    full_name: document.getElementById('ep-name').value.trim(),
    bio:       document.getElementById('ep-bio').value.trim()  || null,
    city:      document.getElementById('ep-city').value.trim() || null,
    website:   document.getElementById('ep-site').value.trim() || null,
  };
  const avtFile = document.getElementById('ep-avt').files[0];
  const covFile = document.getElementById('ep-cov').files[0];
  if (avtFile) {
    const ext=avtFile.name.split('.').pop(), path=user.id+'.'+ext;
    await supabase.storage.from('avatars').upload(path,avtFile,{upsert:true,cacheControl:'3600'});
    updates.avatar_url = supabase.storage.from('avatars').getPublicUrl(path).data.publicUrl;
  }
  if (covFile) {
    const ext=covFile.name.split('.').pop(), path='cover-'+user.id+'.'+ext;
    await supabase.storage.from('covers').upload(path,covFile,{upsert:true,cacheControl:'3600'});
    updates.cover_url = supabase.storage.from('covers').getPublicUrl(path).data.publicUrl;
  }
  const {error} = await supabase.from('profiles').update(updates).eq('id',user.id);
  if (error) { toast('Save failed: '+error.message,'error'); btn.disabled=false; btn.textContent='Save'; return; }
  document.querySelector('.modal-overlay')?.remove();
  toast('Profile updated!','success');
  location.reload();
};

// ── Post actions (required by renderPost) ─────────────────────
window.handleLike = async function(btn,postId){
  const liked=btn.classList.contains('liked');
  const cnt=btn.querySelector('.count'); const n=parseInt(cnt.textContent)||0;
  const svgFill='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
  const svgOut ='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  if (liked) { btn.classList.remove('liked'); cnt.textContent=Math.max(0,n-1); btn.innerHTML=svgOut+'<span class="count">'+Math.max(0,n-1)+'</span>'; await supabase.from('likes').delete().match({user_id:user.id,post_id:postId}); }
  else       { btn.classList.add('liked');    cnt.textContent=n+1;             btn.innerHTML=svgFill+'<span class="count">'+(n+1)+'</span>';            await supabase.from('likes').insert({user_id:user.id,post_id:postId}); }
};

window.toggleComments = async function(btn,postId){
  const box=document.getElementById('comments-'+postId); if(!box) return;
  if(box.style.display!=='none'){box.style.display='none';return;}
  box.style.display='block';
  const {data:cs}=await supabase.from('comments').select('*,author:profiles!author_id(id,full_name,avatar_url)').eq('post_id',postId).order('created_at',{ascending:true});
  const myAvt=avatarUrl(myProfile?.avatar_url);
  box.innerHTML=`<div class="comments-section">
    ${(cs||[]).map(c=>`
      <div class="comment">
        <img src="${avatarUrl(c.author?.avatar_url)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.src='../assets/default-avatar.svg'">
        <div class="comment-body">
          <div class="comment-author"><a href="../pages/profile.html?id=${c.author_id}">${esc(c.author?.full_name||'User')}</a></div>
          <div class="comment-text">${esc(c.content)}</div>
          <div class="comment-meta">${timeAgo(c.created_at)}</div>
        </div>
      </div>`).join('')||'<p style="color:var(--text3);font-size:12px;padding:4px 0">No comments yet</p>'}
    <div class="comment-input-row">
      <img src="${myAvt}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.src='../assets/default-avatar.svg'">
      <input id="ci-${postId}" type="text" placeholder="Write a comment…" onkeydown="if(event.key==='Enter')submitComment('${postId}')">
      <button class="btn btn-primary btn-sm" onclick="submitComment('${postId}')">Send</button>
    </div>
  </div>`;
};

window.submitComment = async function(postId){
  const inp=document.getElementById('ci-'+postId); const txt=inp.value.trim(); if(!txt)return;
  inp.value=''; inp.disabled=true;
  const {data:c}=await supabase.from('comments').insert({post_id:postId,author_id:user.id,content:txt}).select('*,author:profiles!author_id(id,full_name,avatar_url)').single();
  inp.disabled=false; if(!c)return;
  const section=document.querySelector('#comments-'+postId+' .comments-section');
  const row=section.querySelector('.comment-input-row');
  const el=document.createElement('div'); el.className='comment';
  el.innerHTML=`<img src="${avatarUrl(c.author?.avatar_url)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.src='../assets/default-avatar.svg'">
    <div class="comment-body">
      <div class="comment-author"><a href="../pages/profile.html?id=${c.author_id}">${esc(c.author?.full_name||'User')}</a></div>
      <div class="comment-text">${esc(c.content)}</div>
      <div class="comment-meta">just now</div>
    </div>`;
  section.insertBefore(el,row);
};

window.bookmarkPost = async function(postId,btn){
  const isBm=btn.classList.contains('bookmarked');
  const svgFill='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  const svgOut ='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  if(isBm){ btn.classList.remove('bookmarked'); btn.innerHTML=svgOut;  await supabase.from('bookmarks').delete().match({user_id:user.id,post_id:postId}); toast('Removed','info'); }
  else    { btn.classList.add('bookmarked');    btn.innerHTML=svgFill; const{error}=await supabase.from('bookmarks').insert({user_id:user.id,post_id:postId}); if(error?.code==='23505'){toast('Already saved','info');return;} toast('Saved!','success'); }
};

window.togglePostMenu = function(btn,postId){
  document.querySelectorAll('.post-menu-dropdown').forEach(d=>d.remove());
  const m=document.createElement('div'); m.className='post-menu-dropdown';
  m.innerHTML=`<button class="dropdown-item" onclick="editPost('${postId}');this.closest('.post-menu-dropdown').remove()">Edit</button>
               <button class="dropdown-item danger" onclick="deletePost('${postId}');this.closest('.post-menu-dropdown').remove()">Delete</button>`;
  btn.parentElement.style.position='relative'; btn.parentElement.appendChild(m);
  setTimeout(()=>document.addEventListener('click',()=>m.remove(),{once:true}),10);
};
window.deletePost = async function(postId){
  if(!confirm('Delete this post?'))return;
  await supabase.from('posts').delete().eq('id',postId);
  document.querySelector('[data-post-id="'+postId+'"]')?.remove();
  toast('Deleted','success');
};
window.editPost = function(postId){
  const card=document.querySelector('[data-post-id="'+postId+'"]');
  const el=card.querySelector('.post-content'); if(!el)return;
  const old=el.textContent;
  const ta=document.createElement('textarea'); ta.className='compose-input'; ta.value=old; ta.style.cssText='margin:8px 13px;width:calc(100% - 26px)';
  el.replaceWith(ta); ta.focus();
  const foot=document.createElement('div'); foot.style.cssText='padding:0 13px 10px;display:flex;gap:8px;justify-content:flex-end';
  foot.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="cancelEdit('${postId}')">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveEdit('${postId}')">Save</button>`;
  ta.insertAdjacentElement('afterend',foot); card._ta=ta; card._foot=foot; card._old=old;
};
window.cancelEdit = function(postId){const card=document.querySelector('[data-post-id="'+postId+'"]');const div=document.createElement('div');div.className='post-content';div.textContent=card._old;card._ta.replaceWith(div);card._foot.remove();};
window.saveEdit   = async function(postId){const card=document.querySelector('[data-post-id="'+postId+'"]');const txt=card._ta.value.trim();if(!txt)return;await supabase.from('posts').update({content:txt}).eq('id',postId);const div=document.createElement('div');div.className='post-content';div.textContent=txt;card._ta.replaceWith(div);card._foot.remove();toast('Updated','success');};
window.sharePost  = function(postId){navigator.clipboard.writeText(location.origin+'/pages/profile.html?post='+postId);toast('Link copied!','success');};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
