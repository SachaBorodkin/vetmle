<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Search</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
      <span style="font-weight:500">Search</span>
    </div>
    <div class="page-narrow">
      <div style="margin-bottom:14px">
        <div class="search-bar" style="height:42px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="q" placeholder="Search people, communities, posts…" style="padding:0 8px;font-size:14px" onkeydown="if(event.key==='Enter')doSearch()">
          <button class="btn btn-primary btn-sm" onclick="doSearch()">Search</button>
        </div>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:14px" id="type-tabs">
        <button class="tab-btn active" id="t-people"      onclick="setType('people',this)">People</button>
        <button class="tab-btn"        id="t-communities" onclick="setType('communities',this)">Communities</button>
        <button class="tab-btn"        id="t-posts"       onclick="setType('posts',this)">Posts</button>
      </div>

      <div id="results">
        <div class="empty-state"><h3>Search VEtmle</h3><p>Find people, communities, and posts.</p></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile, avatarUrl, timeAgo } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader, renderPost } from '../js/app.js';

let user, profile, searchType = 'people';
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'search');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'search');

  // Prefill from URL param
  const q = new URLSearchParams(location.search).get('q');
  if (q) { document.getElementById('q').value = q; doSearch(); }
}

window.setType = function(type, btn) {
  searchType = type;
  document.querySelectorAll('#type-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const q = document.getElementById('q').value.trim();
  if (q) doSearch();
};

window.doSearch = async function() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  document.getElementById('results').innerHTML = '<div style="display:flex;justify-content:center;padding:36px"><div class="spinner"></div></div>';

  if (searchType === 'people') {
    const {data} = await supabase.from('profiles').select('id,full_name,username,avatar_url,bio')
      .or('full_name.ilike.%'+q+'%,username.ilike.%'+q+'%')
      .limit(20);
    renderPeople(data||[]);
  } else if (searchType === 'communities') {
    const {data} = await supabase.from('groups').select('id,name,description,avatar_url,members_count')
      .ilike('name','%'+q+'%').limit(20);
    renderComms(data||[]);
  } else {
    const {data} = await supabase.from('posts')
      .select('*, author:profiles!author_id(id,full_name,username,avatar_url)')
      .ilike('content','%'+q+'%').order('created_at',{ascending:false}).limit(20);
    renderPosts(data||[]);
  }
};

function renderPeople(pp) {
  const r = document.getElementById('results');
  if (!pp.length) { r.innerHTML='<div class="empty-state"><h3>No people found</h3></div>'; return; }
  r.innerHTML = '<div class="card" style="overflow:hidden">'
    + pp.map(p=>`
    <div class="search-result-item" onclick="location.href='../pages/profile.html?id=${p.id}'">
      <img src="${avatarUrl(p.avatar_url)}" alt="" onerror="this.src='../assets/default-avatar.svg'">
      <div style="flex:1;min-width:0">
        <div class="search-result-name">${esc(p.full_name)}</div>
        <div class="search-result-meta">${p.username?'@'+esc(p.username)+' · ':''} ${esc(p.bio||'')}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();location.href='../pages/messages.html?user=${p.id}'">Message</button>
    </div>`).join('')
    + '</div>';
}

function renderComms(gs) {
  const r = document.getElementById('results');
  if (!gs.length) { r.innerHTML='<div class="empty-state"><h3>No communities found</h3></div>'; return; }
  r.innerHTML = '<div class="card" style="overflow:hidden">'
    + gs.map(g=>`
    <div class="search-result-item" onclick="location.href='../pages/group.html?id=${g.id}'">
      <img src="${g.avatar_url||'../assets/default-avatar.svg'}" style="border-radius:8px" alt="" onerror="this.src='../assets/default-avatar.svg'">
      <div style="flex:1;min-width:0">
        <div class="search-result-name">${esc(g.name)}</div>
        <div class="search-result-meta">${(g.members_count||0)} members · ${esc(g.description||'')}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();location.href='../pages/group.html?id=${g.id}'">View</button>
    </div>`).join('')
    + '</div>';
}

async function renderPosts(posts) {
  const r = document.getElementById('results');
  if (!posts.length) { r.innerHTML='<div class="empty-state"><h3>No posts found</h3></div>'; return; }
  const {data:lks} = await supabase.from('likes').select('post_id').eq('user_id',user.id).in('post_id',posts.map(p=>p.id));
  const liked = new Set((lks||[]).map(l=>l.post_id));
  posts.forEach(p=>p.user_liked=liked.has(p.id));
  r.innerHTML = posts.map(p=>renderPost(p,user.id)).join('');
}

// post action stubs so renderPost links work
window.handleLike = async function(btn,postId){
  const liked=btn.classList.contains('liked'); const cnt=btn.querySelector('.count'); const n=parseInt(cnt.textContent)||0;
  if(liked){btn.classList.remove('liked');cnt.textContent=Math.max(0,n-1);await supabase.from('likes').delete().match({user_id:user.id,post_id:postId});}
  else{btn.classList.add('liked');cnt.textContent=n+1;await supabase.from('likes').insert({user_id:user.id,post_id:postId});}
};
window.toggleComments = function(){};
window.togglePostMenu = function(){};
window.sharePost = function(id){navigator.clipboard.writeText(location.origin+'/pages/feed.html?post='+id);toast('Link copied!','success');};
window.bookmarkPost = async function(postId,btn){
  const isBm=btn.classList.contains('bookmarked');
  if(isBm){btn.classList.remove('bookmarked');await supabase.from('bookmarks').delete().match({user_id:user.id,post_id:postId});toast('Removed','info');}
  else{btn.classList.add('bookmarked');await supabase.from('bookmarks').insert({user_id:user.id,post_id:postId});toast('Saved!','success');}
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
