<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VEtmle — Search</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content">
        <div class="topbar">
          <button
            onclick="toggleSidebar()"
            style="
              background: none;
              border: none;
              color: var(--text);
              font-size: 22px;
            "
          >
            ☰
          </button>
          <span style="font-weight: 700">Search</span>
        </div>

        <div class="page-container wide">
          <div class="page-title">🔍 Search</div>

          <div
            class="search-bar card"
            style="margin-bottom: 16px; padding: 0 18px"
          >
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="main-search"
              placeholder="Search people, groups, posts..."
              style="
                background: transparent;
                border: none;
                box-shadow: none;
                padding: 14px 0;
                font-size: 16px;
              "
              autofocus
              oninput="handleSearch(this.value)"
            />
            <span id="search-spinner" style="display: none"
              ><div class="spinner" style="width: 18px; height: 18px"></div
            ></span>
          </div>

          <div
            style="
              display: flex;
              gap: 4px;
              margin-bottom: 16px;
              flex-wrap: wrap;
            "
            id="filter-tabs"
            style="display: none"
          >
            <button
              class="btn btn-primary btn-sm"
              id="filter-people"
              onclick="setSearchFilter('people')"
            >
              👤 People
            </button>
            <button
              class="btn btn-ghost btn-sm"
              id="filter-groups"
              onclick="setSearchFilter('groups')"
            >
              🏛️ Groups
            </button>
            <button
              class="btn btn-ghost btn-sm"
              id="filter-posts"
              onclick="setSearchFilter('posts')"
            >
              📝 Posts
            </button>
          </div>

          <div id="search-results">
            <div class="empty-state" style="padding: 60px">
              <div class="empty-icon">🔍</div>
              <h3>Search for anything</h3>
              <p>Find people, groups, and posts</p>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div id="toast-container"></div>

    <script type="module">
      import {
        supabase,
        requireAuth,
        getCurrentProfile,
        avatarUrl,
        timeAgo,
      } from "../js/supabase.js";
      import { toast, renderSidebar } from "../js/app.js";

      let currentUser = null;
      let searchTimeout = null;
      let currentFilter = "people";
      let lastQuery = "";
      let myFriendIds = new Set();

      async function init() {
        currentUser = await requireAuth();
        if (!currentUser) return;
        const profile = await getCurrentProfile();
        document.getElementById("sidebar").innerHTML = renderSidebar(
          profile,
          "search",
        );

        // Pre-load friend IDs
        const { data: friendships } = await supabase
          .from("friendships")
          .select("requester_id, addressee_id")
          .or(
            `requester_id.eq.${currentUser.id},addressee_id.eq.${currentUser.id}`,
          )
          .eq("status", "accepted");

        (friendships || []).forEach((f) => {
          myFriendIds.add(
            f.requester_id === currentUser.id ? f.addressee_id : f.requester_id,
          );
        });

        // Auto-search if ?q= param
        const params = new URLSearchParams(location.search);
        const q = params.get("q");
        if (q) {
          document.getElementById("main-search").value = q;
          performSearch(q);
        }
      }

      window.handleSearch = function (value) {
        clearTimeout(searchTimeout);
        if (!value.trim()) {
          document.getElementById("search-results").innerHTML = `
      <div class="empty-state" style="padding:60px">
        <div class="empty-icon">🔍</div><h3>Search for anything</h3><p>Find people, groups, and posts</p>
      </div>`;
          return;
        }
        document.getElementById("search-spinner").style.display = "block";
        searchTimeout = setTimeout(() => performSearch(value.trim()), 350);
      };

      async function performSearch(query) {
        lastQuery = query;
        document.getElementById("filter-tabs").style.display = "flex";
        document.getElementById("search-spinner").style.display = "none";
        setSearchFilter(currentFilter, query);
      }

      window.setSearchFilter = async function (filter, query) {
        currentFilter = filter;
        query = query || lastQuery;
        ["people", "groups", "posts"].forEach((f) => {
          document.getElementById(`filter-${f}`).className =
            `btn btn-sm ${f === filter ? "btn-primary" : "btn-ghost"}`;
        });

        const results = document.getElementById("search-results");
        results.innerHTML =
          '<div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div>';

        if (filter === "people") await searchPeople(query, results);
        else if (filter === "groups") await searchGroups(query, results);
        else await searchPosts(query, results);
      };

      async function searchPeople(query, container) {
        const { data: people } = await supabase
          .from("profiles")
          .select("*")
          .or(`full_name.ilike.%${query}%,username.ilike.%${query}%`)
          .neq("id", currentUser.id)
          .limit(20);

        if (!people?.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><h3>No people found</h3></div>`;
          return;
        }

        container.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${people
        .map((p) => {
          const isFriend = myFriendIds.has(p.id);
          return `
          <div class="card" style="padding:14px;display:flex;align-items:center;gap:12px">
            <img class="avatar avatar-md" src="${avatarUrl(p.avatar_url)}" style="cursor:pointer"
                 onclick="window.location.href='../pages/profile.html?id=${p.id}'" alt="">
            <div style="flex:1">
              <a href="../pages/profile.html?id=${p.id}" style="font-weight:700;color:var(--text)">${p.full_name}</a>
              <div style="font-size:12px;color:var(--text3)">@${p.username}${p.city ? ` · 📍 ${p.city}` : ""}</div>
            </div>
            <div style="display:flex;gap:6px">
              ${
                isFriend
                  ? `<button class="btn btn-primary btn-sm" onclick="window.location.href='../pages/messages.html?user=${p.id}'">✉️ Message</button>`
                  : `<button class="btn btn-primary btn-sm" onclick="addFriend('${p.id}', this)">➕ Add Friend</button>`
              }
              <button class="btn btn-ghost btn-sm" onclick="window.location.href='../pages/profile.html?id=${p.id}'">View</button>
            </div>
          </div>
        `;
        })
        .join("")}
    </div>
  `;
      }

      async function searchGroups(query, container) {
        const { data: groups } = await supabase
          .from("groups")
          .select("*")
          .ilike("name", `%${query}%`)
          .limit(20);

        if (!groups?.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛️</div><h3>No groups found</h3></div>`;
          return;
        }

        container.innerHTML = `
    <div class="groups-grid">
      ${groups
        .map(
          (g) => `
        <div class="group-card" onclick="window.location.href='../pages/group.html?id=${g.id}'">
          <div class="group-cover">
            <div class="group-avatar-wrap" style="display:flex;align-items:center;justify-content:center;font-size:20px">🏛️</div>
          </div>
          <div class="group-body">
            <div class="group-name">${g.name}</div>
            <div class="group-desc">${g.description || "No description"}</div>
            <div style="font-size:12px;color:var(--text3)">👥 ${g.members_count} members</div>
          </div>
        </div>
      `,
        )
        .join("")}
    </div>
  `;
      }

      async function searchPosts(query, container) {
        const { data: posts } = await supabase
          .from("posts")
          .select(
            "*, author:profiles!author_id(id, full_name, username, avatar_url)",
          )
          .ilike("content", `%${query}%`)
          .order("created_at", { ascending: false })
          .limit(20);

        if (!posts?.length) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>No posts found</h3></div>`;
          return;
        }

        container.innerHTML = posts
          .map(
            (p) => `
    <div class="post-card" style="margin-bottom:12px">
      <div class="post-header">
        <img class="avatar avatar-md" src="${avatarUrl(p.author?.avatar_url)}" style="cursor:pointer"
             onclick="window.location.href='../pages/profile.html?id=${p.author_id}'" alt="">
        <div class="post-header-info">
          <a class="post-author-name" href="../pages/profile.html?id=${p.author_id}">${p.author?.full_name}</a>
          <div class="post-meta">${timeAgo(p.created_at)}</div>
        </div>
      </div>
      <div class="post-content">${highlight(p.content, query)}</div>
      ${p.image_url ? `<img class="post-image" src="${p.image_url}" style="max-height:200px">` : ""}
    </div>
  `,
          )
          .join("");
      }

      function highlight(text, query) {
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(
          new RegExp(escaped, "gi"),
          (m) =>
            `<mark style="background:rgba(91,127,255,0.3);color:var(--text);border-radius:2px">${m}</mark>`,
        );
      }

      window.addFriend = async function (userId, btn) {
        btn.disabled = true;
        btn.textContent = "Sent ✓";
        await supabase
          .from("friendships")
          .insert({
            requester_id: currentUser.id,
            addressee_id: userId,
            status: "pending",
          });
        await supabase
          .from("notifications")
          .insert({
            user_id: userId,
            actor_id: currentUser.id,
            type: "friend_request",
          });
        toast("Friend request sent!", "success");
      };

      window.toggleSidebar = function () {
        document.getElementById("sidebar").classList.toggle("open");
      };

      init();
    </script>
  </body>
</html>
