<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEtmle — Settings</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<header class="vk-header" id="vk-header"></header>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px">&#9776;</button>
      <span style="font-weight:500">Settings</span>
    </div>
    <div class="page-narrow">
      <h1 style="font-size:17px;font-weight:500;margin-bottom:14px">Settings</h1>

      <!-- Profile Settings -->
      <div class="settings-card" style="margin-bottom:10px">
        <div class="settings-head">Profile</div>
        <div id="profile-form" style="padding:14px">
          <div class="form-group">
            <label>Full Name</label>
            <input id="s-name" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Username</label>
            <input id="s-user" placeholder="username (no spaces)">
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea id="s-bio" placeholder="Tell people about yourself…" rows="3"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <label>City</label>
              <input id="s-city" placeholder="Your city">
            </div>
            <div class="form-group">
              <label>Website</label>
              <input id="s-site" placeholder="https://…">
            </div>
          </div>
          <div class="form-group">
            <label>Birthday</label>
            <input type="date" id="s-bday">
          </div>
          <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()">Save Profile</button>
        </div>
      </div>

      <!-- Avatar / Cover -->
      <div class="settings-card" style="margin-bottom:10px">
        <div class="settings-head">Photos</div>
        <div style="padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>Profile Avatar</label>
            <input type="file" id="s-avt" accept="image/*">
            <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="uploadAvatar()">Upload Avatar</button>
          </div>
          <div class="form-group">
            <label>Cover Photo</label>
            <input type="file" id="s-cov" accept="image/*">
            <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="uploadCover()">Upload Cover</button>
          </div>
        </div>
      </div>

      <!-- Security -->
      <div class="settings-card" style="margin-bottom:10px">
        <div class="settings-head">Account & Security</div>
        <div style="padding:14px">
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="s-pw" placeholder="Leave blank to keep current">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="s-pw2" placeholder="Confirm new password">
          </div>
          <button class="btn btn-secondary" onclick="changePassword()">Change Password</button>
        </div>
        <div style="border-top:1px solid var(--border);padding:14px">
          <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Email: <span id="s-email" style="color:var(--text)"></span></div>
          <button class="btn btn-danger btn-sm" onclick="signOut()">Sign Out</button>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { supabase, requireAuth, getCurrentProfile } from '../js/supabase.js';
import { toast, renderSidebar, renderHeader } from '../js/app.js';

let user, profile;

async function init() {
  user    = await requireAuth(); if (!user) return;
  profile = await getCurrentProfile();
  renderHeader(profile, 'settings');
  document.getElementById('sidebar').innerHTML = renderSidebar(profile, 'settings');
  prefill();
}

function prefill() {
  document.getElementById('s-name').value = profile?.full_name || '';
  document.getElementById('s-user').value = profile?.username  || '';
  document.getElementById('s-bio').value  = profile?.bio       || '';
  document.getElementById('s-city').value = profile?.city      || '';
  document.getElementById('s-site').value = profile?.website   || '';
  document.getElementById('s-bday').value = profile?.birthdate ? profile.birthdate.split('T')[0] : '';
  document.getElementById('s-email').textContent = user.email || '';
}

window.saveProfile = async function() {
  const btn = document.getElementById('save-profile-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const {error} = await supabase.from('profiles').update({
    full_name: document.getElementById('s-name').value.trim(),
    username:  document.getElementById('s-user').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'') || null,
    bio:       document.getElementById('s-bio').value.trim() || null,
    city:      document.getElementById('s-city').value.trim() || null,
    website:   document.getElementById('s-site').value.trim() || null,
    birthdate: document.getElementById('s-bday').value || null,
  }).eq('id',user.id);
  btn.disabled = false; btn.textContent = 'Save Profile';
  if (error) { toast('Save failed: '+error.message,'error'); return; }
  toast('Profile saved!','success');
};

window.uploadAvatar = async function() {
  const file = document.getElementById('s-avt').files[0];
  if (!file) { toast('Select a file first','info'); return; }
  const ext  = file.name.split('.').pop();
  const path = user.id + '.' + ext;
  const {error:ue} = await supabase.storage.from('avatars').upload(path, file, {upsert:true,cacheControl:'3600'});
  if (ue) { toast('Upload failed: '+ue.message,'error'); return; }
  const url = supabase.storage.from('avatars').getPublicUrl(path).data.publicUrl;
  await supabase.from('profiles').update({avatar_url:url}).eq('id',user.id);
  toast('Avatar updated!','success');
};

window.uploadCover = async function() {
  const file = document.getElementById('s-cov').files[0];
  if (!file) { toast('Select a file first','info'); return; }
  const ext  = file.name.split('.').pop();
  const path = 'cover-'+user.id+'.'+ext;
  const {error:ue} = await supabase.storage.from('covers').upload(path, file, {upsert:true,cacheControl:'3600'});
  if (ue) { toast('Upload failed: '+ue.message,'error'); return; }
  const url = supabase.storage.from('covers').getPublicUrl(path).data.publicUrl;
  await supabase.from('profiles').update({cover_url:url}).eq('id',user.id);
  toast('Cover updated!','success');
};

window.changePassword = async function() {
  const pw  = document.getElementById('s-pw').value;
  const pw2 = document.getElementById('s-pw2').value;
  if (!pw) { toast('Enter a new password','info'); return; }
  if (pw !== pw2) { toast('Passwords don\'t match','error'); return; }
  if (pw.length < 6) { toast('Password must be at least 6 characters','error'); return; }
  const {error} = await supabase.auth.updateUser({password:pw});
  if (error) { toast('Error: '+error.message,'error'); return; }
  toast('Password changed!','success');
  document.getElementById('s-pw').value = '';
  document.getElementById('s-pw2').value = '';
};

window.signOut = async function() {
  if (!confirm('Sign out?')) return;
  await supabase.auth.signOut();
  location.href = '../index.html';
};

window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
init();
</script>
</body>
</html>
